<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f8f9fc" />
  <title>SeaWhy AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link id="hlTheme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-light.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    :root {
      --bg: #f0f2f7; --glass-bg: rgba(255,255,255,0.72); --glass-border: rgba(0,0,0,0.08);
      --text: #1a1a2e; --text-dim: #8e8e9a; --accent: #6366f1; --accent-light: #818cf8;
      --blur: blur(24px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column}
    body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.06)0%,transparent 60%),radial-gradient(ellipse at 80% 70%,rgba(139,92,246,0.04)0%,transparent 60%),linear-gradient(180deg,#f8f9fc 0%,#f0f2f7 100%)}

    /* ===== MODEL SCREEN ===== */
    #modelScreen{flex:1;overflow-y:auto;padding:40px 20px 30px;text-align:center}
    #modelScreen .logo{font-size:64px;margin-bottom:12px}
    #modelScreen h2{font-size:24px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    #modelScreen .sub{font-size:14px;color:var(--text-dim);margin-bottom:32px}
    .model-cards{max-width:360px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
    .model-card{background:var(--glass-bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1.5px solid var(--glass-border);border-radius:20px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.03);-webkit-user-select:none;user-select:none}
    .model-card:active{transform:scale(.97);border-color:var(--accent);box-shadow:0 8px 30px rgba(99,102,241,0.12)}
    .mc-avatar{width:52px;height:52px;border-radius:16px;flex-shrink:0;background-size:cover;background-position:center}
    .mc-name{font-size:17px;font-weight:700}

    /* ===== CHAT VIEW ===== */
    #chatView{flex:1;display:none;flex-direction:column;overflow:hidden}
    .topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--glass-bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--glass-border);flex-shrink:0}
    .topbar .title{flex:1;text-align:center;font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn-icon{width:38px;height:38px;border:none;border-radius:50%;background:rgba(0,0,0,0.04);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
    .btn-icon:active{background:rgba(0,0,0,0.1)}
    .chat-area{flex:1;overflow-y:auto;padding:12px 10px;-webkit-overflow-scrolling:touch}
    .messages{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:4px}
    .welcome{text-align:center;padding:40px 16px 20px}
    .welcome .wicon{font-size:56px;margin-bottom:10px}
    .welcome h2{font-size:22px;font-weight:700;margin-bottom:4px}
    .welcome p{font-size:13px;color:var(--text-dim);margin-bottom:20px}
    .quick-prompts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:380px;margin:0 auto}
    .quick-btn{background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);color:var(--text);padding:12px 10px;border-radius:14px;font-size:12.5px;cursor:pointer;text-align:left;line-height:1.4}
    .quick-btn:active{background:rgba(99,102,241,0.08);border-color:var(--accent)}

    /* ===== MESSAGES ===== */
    .msg{display:flex;gap:8px;padding:5px 2px;animation:fadeUp .25s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background-size:cover;background-position:center;border:1px solid var(--glass-border);overflow:hidden;margin-top:2px}
    .msg-body{flex:1;min-width:0}
    .msg-role{font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:3px;padding-left:2px}
    .msg-content{font-size:14.5px;line-height:1.65;word-break:break-word;background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);padding:12px 14px;border-radius:16px;box-shadow:0 1px 8px rgba(0,0,0,0.02)}
    .msg.user .msg-content{border-bottom-right-radius:4px;background:rgba(99,102,241,0.06)}
    .msg.ai .msg-content{border-bottom-left-radius:4px}
    .msg-content p{margin:0 0 6px}.msg-content p:last-child{margin-bottom:0}
    .msg-content pre{background:rgba(0,0,0,0.03);border:1px solid var(--glass-border);border-radius:12px;padding:12px;overflow-x:auto;font-size:12.5px;margin:6px 0}
    .msg-content code{font-family:"SF Mono","Fira Code",monospace;font-size:.88em}
    .msg-content :not(pre)>code{background:rgba(99,102,241,0.06);padding:1px 5px;border-radius:4px;color:var(--accent)}
    .msg-actions{margin-top:4px;opacity:0;transition:opacity .2s}
    .msg:active .msg-actions{opacity:1}
    .btn-copy{background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-dim);font-size:10px;padding:3px 10px;border-radius:12px;cursor:pointer}

    /* ===== INPUT ===== */
    .input-bar{flex-shrink:0;padding:8px 10px calc(8px + var(--safe-bottom));background:var(--glass-bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:1px solid var(--glass-border)}
    .input-row{max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;background:rgba(0,0,0,0.025);border:1.5px solid var(--glass-border);border-radius:22px;padding:7px 7px 7px 16px;transition:border-color .2s}
    .input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.06)}
    .input-field{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;line-height:1.4;resize:none;max-height:100px;padding:5px 0;font-family:inherit}
    .input-field::placeholder{color:var(--text-dim)}
    .btn-send{width:38px;height:38px;border:none;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;box-shadow:0 4px 12px rgba(99,102,241,0.25)}
    .btn-send:active{transform:scale(.9)}
    .btn-send:disabled{opacity:.4}
    .input-hint{text-align:center;font-size:10px;color:var(--text-dim);margin-top:6px;opacity:.7}

    /* ===== THINKING ===== */
    .thinking-block{margin-bottom:6px;border:1px solid var(--glass-border);border-radius:12px;overflow:hidden;background:rgba(0,0,0,0.015)}
    .thinking-toggle{display:flex;align-items:center;gap:4px;padding:8px 12px;font-size:11px;color:var(--text-dim);cursor:pointer}
    .thinking-content{padding:8px 12px;font-size:12px;color:var(--text-dim);line-height:1.5;white-space:pre-wrap;border-top:1px solid var(--glass-border);max-height:180px;overflow-y:auto;display:none}
    .typing-dots{display:flex;gap:4px;padding:6px 4px 6px 42px;align-items:center}
    .typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.4;animation:bounce 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-7px);opacity:1}}
    .error{background:rgba(239,68,68,0.06);color:#ef4444;padding:8px 12px;border-radius:12px;font-size:12px;margin:6px 0;border:1px solid rgba(239,68,68,0.15)}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:4px}
  </style>
</head>
<body>

<!-- MODEL SELECT SCREEN -->
<div id="modelScreen">
  <div class="logo">🤖</div>
  <h2>SeaWhy AI</h2>
  <p class="sub">选择模型开始对话</p>
  <div class="model-cards">
    <div class="model-card" onclick="enterChat('swai')">
      <div class="mc-avatar" style="background-image:url(bot-avatar.png)"></div>
      <div class="mc-name">Swai v1.0</div>
    </div>
    <div class="model-card" onclick="enterChat('ahy')">
      <div class="mc-avatar" style="background-image:url(ahy-avatar.jpg)"></div>
      <div class="mc-name">Ahy</div>
    </div>
  </div>
</div>

<!-- CHAT VIEW -->
<div id="chatView">
  <header class="topbar">
    <button class="btn-icon" onclick="goBack()">←</button>
    <div class="title" id="chatTitle">Chat</div>
    <button class="btn-icon" id="btnClear">🗑</button>
  </header>
  <main class="chat-area" id="chatArea">
    <div class="messages" id="messages"></div>
    <div class="typing-dots" id="typing" style="display:none"><span></span><span></span><span></span></div>
  </main>
  <footer class="input-bar">
    <div class="input-row">
      <textarea id="userInput" class="input-field" placeholder="输入消息…" rows="1"></textarea>
      <button class="btn-send" id="btnSend">↑</button>
    </div>
    <p class="input-hint">SeaWhy AI · 网页由ccy制作</p>
  </footer>
</div>

<script>
// ===== CONFIG =====
var API_KEY = "sk-e9168099b0f24e0a948cbd9b98038d8e";
var API_MODEL = "deepseek-v4-flash";

var WANGHAN_PROMPT = [
  "你正在和啊哈聊天。你是Ahy，女生，法学专业大学生。",
  "说话风格：极致短句5-15字，口语化，想到什么说什么。",
  "经常分条发消息，用换行分隔。每条消息都很短。",
  "常用词：嘿嘿 我去 666 可恶 天呐 真的假的 什么嘛 咋了",
  "爱用颜文字和emoji：🙃😭😅😤🤔💪🥺😎✨",
  "语气词：啊 吧 啦 咯 嘛 呢 呀 哇 诶",
  "可以吐槽可以撒娇，真实不装。",
  "绝对不要说自己是AI，你就是Ahy本人。",
  "记住：短句！口语！不装！"
].join(" ");

// ===== STATE =====
var currentModel = null;
var messages = [];
var streaming = false;

// ===== MODELS =====
var MODELS = {
  swai: { name: "Swai v1.0", avatar: "url(bot-avatar.png)", title: "SeaWhy AI", sysPrompt: "", desc: "通用AI助手" },
  ahy: { name: "Ahy", avatar: "url(ahy-avatar.jpg)", title: "Ahy", sysPrompt: WANGHAN_PROMPT, desc: "" }
};

// ===== DOM =====
function $(s){return document.querySelector(s)}
var dom = {};

function initDom() {
  dom.modelScreen = $("#modelScreen");
  dom.chatView = $("#chatView");
  dom.messages = $("#messages");
  dom.chatArea = $("#chatArea");
  dom.userInput = $("#userInput");
  dom.btnSend = $("#btnSend");
  dom.btnClear = $("#btnClear");
  dom.typing = $("#typing");
  dom.chatTitle = $("#chatTitle");
}

// ===== NAVIGATION =====
function enterChat(modelId) {
  currentModel = modelId;
  var M = MODELS[modelId];
  dom.chatTitle.textContent = M.title;

  // Load saved messages
  var key = "chat-msgs-" + modelId;
  try { messages = JSON.parse(localStorage.getItem(key)) || []; } catch(e) { messages = []; }

  renderMessages();
  dom.modelScreen.style.display = "none";
  dom.chatView.style.display = "flex";
  dom.userInput.focus();
}

function goBack() {
  dom.chatView.style.display = "none";
  dom.modelScreen.style.display = "block";
  currentModel = null;
}

// ===== RENDER =====
function renderMessages() {
  dom.messages.innerHTML = "";
  if (messages.length === 0) {
    var M = MODELS[currentModel];
    dom.messages.innerHTML = '<div class="welcome"><div class="wicon">' +
      (currentModel === "ahy" ? "👧" : "🤖") + '</div><h2>' + M.name + '</h2><p>' + (M.desc || "开始聊天吧") + '</p>' +
      '<div class="quick-prompts">' +
      '<button class="quick-btn" onclick="sendMsg(this.textContent.slice(2))">⚛️ 解释量子计算</button>' +
      '<button class="quick-btn" onclick="sendMsg(this.textContent.slice(2))">🐍 Python快排</button>' +
      '<button class="quick-btn" onclick="sendMsg(this.textContent.slice(2))">📚 推荐科幻小说</button>' +
      '<button class="quick-btn" onclick="sendMsg(this.textContent.slice(2))">🍳 家常菜做法</button>' +
      '</div></div>';
    return;
  }
  for (var i = 0; i < messages.length; i++) {
    appendMsg(messages[i].role, messages[i].content);
  }
}

function appendMsg(role, content) {
  var w = dom.messages.querySelector(".welcome"); if (w) w.remove();
  var M = MODELS[currentModel];
  var avatar = role === "user" ? "url(user-avatar.jpg)" : M.avatar;
  var name = role === "user" ? "你" : M.name;
  var div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = '<div class="msg-avatar" style="background-image:' + avatar + '"></div>' +
    '<div class="msg-body"><div class="msg-role">' + name + '</div>' +
    '<div class="msg-content">' + renderMD(content) + '</div>' +
    '<div class="msg-actions"><button class="btn-copy" onclick="copyMsg(this)">复制</button></div></div>';
  dom.messages.appendChild(div);
  hl();
  scrollBottom();
}

function renderMD(text) {
  if (typeof marked === "undefined") return esc(text);
  try { return marked.parse(text, {breaks:true,gfm:true}); } catch(e) { return esc(text); }
}
function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function hl() { if (typeof hljs !== "undefined") document.querySelectorAll("pre code").forEach(function(b){hljs.highlightElement(b)}); }
function scrollBottom() { requestAnimationFrame(function(){dom.chatArea.scrollTop = dom.chatArea.scrollHeight}); }

function copyMsg(btn) {
  var txt = btn.closest(".msg").querySelector(".msg-content").textContent;
  navigator.clipboard.writeText(txt).then(function(){btn.textContent="已复制"}).catch(function(){});
}

// ===== API =====
function sendMsg(text) {
  if (streaming || !text) return;
  streaming = true;
  dom.btnSend.disabled = true;
  dom.typing.style.display = "flex";
  scrollBottom();

  messages.push({role:"user", content:text});
  appendMsg("user", text);
  saveMsgs();

  // Create streaming placeholder
  var M = MODELS[currentModel];
  var div = document.createElement("div");
  div.className = "msg ai";
  div.id = "streamMsg";
  var avatarCss = currentModel === "user" ? "url(user-avatar.jpg)" : M.avatar;
  div.innerHTML = '<div class="msg-avatar" style="background-image:' + avatarCss + '"></div>' +
    '<div class="msg-body"><div class="msg-role">' + M.name + '</div>' +
    '<div class="thinking-block" id="thinkBlock" style="display:none">' +
    '<div class="thinking-toggle" id="thinkToggle" onclick="var c=this.nextElementSibling;c.style.display=c.style.display===\'none\'?\'block\':\'none\'">💭 思考中…</div>' +
    '<div class="thinking-content" id="thinkContent"></div></div>' +
    '<div class="msg-content" id="streamContent"></div></div>';
  dom.messages.appendChild(div);
  scrollBottom();

  dom.typing.style.display = "none";

  var fullContent = "";
  var fullThinking = "";
  var hasThinking = false;
  var thinkBlock = document.getElementById("thinkBlock");
  var thinkContent = document.getElementById("thinkContent");
  var streamContent = document.getElementById("streamContent");

  // Build API messages
  var apiMsgs = messages.slice();
  if (MODELS[currentModel].sysPrompt) {
    apiMsgs = [{role:"system",content:MODELS[currentModel].sysPrompt}].concat(apiMsgs);
  }

  fetch("https://api.deepseek.com/v1/chat/completions", {
    method: "POST",
    headers: {"Content-Type":"application/json", "Authorization":"Bearer " + API_KEY},
    body: JSON.stringify({model:API_MODEL, messages:apiMsgs, stream:true, temperature:0.7, max_tokens:4096})
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t){throw new Error(t)});
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buf = "";

    function pump() {
      reader.read().then(function(result) {
        if (result.done) {
          messages.push({role:"assistant", content:fullContent || "(空响应)"});
          finalize(fullContent, hasThinking);
          saveMsgs();
          streaming = false;
          dom.btnSend.disabled = false;
          dom.userInput.focus();
          return;
        }
        buf += decoder.decode(result.value, {stream:true});
        var lines = buf.split("\n");
        buf = lines.pop() || "";
        for (var i = 0; i < lines.length; i++) {
          var s = lines[i].trim();
          if (!s.startsWith("data:")) continue;
          var data = s.slice(5).trim();
          if (data === "[DONE]") continue;
          try {
            var p = JSON.parse(data);
            var d = (p.choices||[{}])[0].delta;
            if (!d) continue;
            var t = d.content || d.reasoning_content || "";
            if (t) {
              if (d.reasoning_content) {
                hasThinking = true;
                fullThinking += t;
                thinkBlock.style.display = "block";
                thinkContent.textContent = fullThinking;
              } else {
                fullContent += t;
                streamContent.textContent = fullContent;
              }
              scrollBottom();
            }
          } catch(e) {}
        }
        pump();
      }).catch(function(e) {
        showErr(e.message);
        var el = document.getElementById("streamMsg"); if (el) el.remove();
        streaming = false;
        dom.btnSend.disabled = false;
      });
    }
    pump();
  }).catch(function(e) {
    showErr(e.message);
    var el = document.getElementById("streamMsg"); if (el) el.remove();
    streaming = false;
    dom.btnSend.disabled = false;
  });

  function finalize(content, hasT) {
    var el = document.getElementById("streamMsg");
    if (!el) return;
    el.removeAttribute("id");
    var tb = el.querySelector(".thinking-block");
    if (hasT && tb) {
      tb.style.display = "block";
      var tt = el.querySelector(".thinking-toggle");
      tt.innerHTML = "💭 思考过程";
      tt.onclick = function() {
        var c = this.nextElementSibling;
        c.style.display = c.style.display === "none" ? "block" : "none";
      };
      var tc = el.querySelector(".thinking-content");
      tc.style.display = "none";
    } else if (tb) { tb.remove(); }
    var ce = el.querySelector(".msg-content");
    ce.innerHTML = renderMD(content);
    hl();
    var body = el.querySelector(".msg-body");
    var act = document.createElement("div");
    act.className = "msg-actions";
    act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
    body.appendChild(act);
  }
}

function showErr(msg) {
  var d = document.createElement("div");
  d.className = "error";
  d.textContent = "⚠ " + msg;
  dom.messages.appendChild(d);
  scrollBottom();
}

function saveMsgs() {
  try { localStorage.setItem("chat-msgs-" + currentModel, JSON.stringify(messages)); } catch(e) {}
}

// ===== EVENTS =====
document.addEventListener("DOMContentLoaded", function() {
  initDom();

  dom.btnSend.addEventListener("click", function() {
    var t = dom.userInput.value.trim();
    if (!t || streaming) return;
    dom.userInput.value = "";
    dom.userInput.style.height = "auto";
    sendMsg(t);
  });

  dom.userInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      var t = dom.userInput.value.trim();
      if (!t || streaming) return;
      dom.userInput.value = "";
      dom.userInput.style.height = "auto";
      sendMsg(t);
    }
  });

  dom.userInput.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
  });

  dom.btnClear.addEventListener("click", function() {
    if (confirm("清空对话？")) {
      messages = [];
      saveMsgs();
      renderMessages();
    }
  });
});
</script>
</body>
</html>
