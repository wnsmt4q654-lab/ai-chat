<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SeaWhy AI" />
  <link rel="apple-touch-icon" href="swai-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>SeaWhy AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link id="hlTheme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-light.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100dvh;height:-webkit-fill-available;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
    :root{
      --bg:#fff;--nav-bg:#fff;--card-bg:#fff;--card-border:rgba(0,0,0,0.08);
      --text:#111;--text2:#888;--input-bg:#fff;--input-border:rgba(0,0,0,0.12);
      --ai-bubble:#fff;--user-bubble:#C5DFF8;--bubble-shadow:0 1px 4px rgba(0,0,0,0.06);
      --invite-bg:#fff;--accent:#4A90D9;--accent-light:rgba(74,144,217,0.12);
    }
    body.dark{
      --bg:#111;--nav-bg:#1a1a1a;--card-bg:#1a1a1a;--card-border:#333;
      --text:#e5e5e5;--text2:#999;--input-bg:#222;--input-border:#333;
      --ai-bubble:#262626;--user-bubble:#054740;--bubble-shadow:none;
      --invite-bg:#111;--accent:#4A90D9;--accent-light:rgba(74,144,217,0.18);
    }
    body{display:flex;flex-direction:column;background:var(--bg)}

    /* ===== INVITE ===== */
    #inviteScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(30px,env(safe-area-inset-top)) 24px max(30px,env(safe-area-inset-bottom));text-align:center;background:var(--invite-bg)}
    #inviteScreen.hide{display:none!important}
    #inviteScreen .logo{font-size:64px;margin-bottom:12px}
    #inviteScreen h2{font-size:22px;font-weight:700;margin-bottom:6px}
    #inviteScreen .sub{font-size:13px;color:var(--text2);margin-bottom:28px}
    .invite-input{width:100%;max-width:280px;padding:15px 20px;border:2px solid var(--input-border);border-radius:28px;font-size:18px;text-align:center;letter-spacing:4px;outline:none;font-family:inherit;background:var(--input-bg);color:var(--text);margin-bottom:14px;transition:all .2s}
    .invite-input:focus{border-color:var(--accent)}
    .invite-btn{width:100%;max-width:280px;padding:15px;border:none;border-radius:28px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;color:#fff;transition:all .15s}
    .invite-btn:active{opacity:.8;transform:scale(.98)}
    .invite-btn{background:var(--accent)}
    .invite-skip{width:100%;max-width:280px;padding:12px;border:none;border-radius:28px;font-size:13px;cursor:pointer;background:transparent;color:var(--text2)}
    .invite-err{color:#e74c3c;font-size:12px;margin-top:4px;min-height:18px}
    .invite-info{font-size:10px;color:#bbb;margin-top:20px}

    /* ===== MODEL SCREEN ===== */
    #modelScreen{flex:1;overflow-y:auto;padding:max(40px,env(safe-area-inset-top)) 20px max(30px,env(safe-area-inset-bottom));text-align:center;background:var(--invite-bg);display:none!important}
    #modelScreen.show{display:block!important}
    #modelScreen .logo{font-size:64px;margin-bottom:12px}
    #modelScreen h2{font-size:22px;font-weight:700;margin-bottom:6px}
    #modelScreen .sub{font-size:14px;color:var(--text2);margin-bottom:32px}
    .model-cards{max-width:320px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
    .model-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:15px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
    .model-card:active{background:var(--input-bg);transform:scale(.98)}
    .mc-avatar{width:50px;height:50px;border-radius:50%;flex-shrink:0;overflow:hidden}
    .mc-avatar img{width:100%;height:100%;object-fit:cover}
    .mc-name{font-size:17px;font-weight:500}
    .mc-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500;margin-left:auto;flex-shrink:0}
    .mc-badge.rec{background:var(--accent-light);color:var(--accent)}
    .mc-badge.custom{background:rgba(0,0,0,0.05);color:var(--text2)}

    /* ===== CHAT ==== */
    #chatView{flex:1;display:none!important;flex-direction:column;overflow:hidden;overscroll-behavior:none;background:var(--bg)}
    #chatView.show{display:flex!important}

    /* Nav */
    .wx-nav{display:flex;align-items:center;padding:env(safe-area-inset-top) 12px 0;height:calc(46px + env(safe-area-inset-top));background:var(--nav-bg);flex-shrink:0;border-bottom:1px solid var(--card-border)}
    .wx-nav .back{font-size:16px;color:var(--accent);cursor:pointer;padding:8px 4px;flex-shrink:0;white-space:nowrap;border:none;background:none;font-family:inherit}
    .wx-nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .wx-nav .right-btn{font-size:20px;color:var(--text);cursor:pointer;padding:8px;width:44px;text-align:center;flex-shrink:0;border:none;background:none;position:relative}

    /* Settings dropdown */
    .settings-drop{position:absolute;top:42px;right:4px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:14px 16px;min-width:180px;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,0.12);opacity:0;transform:translateY(-8px) scale(.95);pointer-events:none;transition:opacity .2s ease,transform .2s ease}
    .settings-drop.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
    .settings-drop .s-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:13px;color:var(--text)}
    .settings-drop .s-row:last-child{margin-bottom:0}
    .settings-drop .s-label{font-size:12px;color:var(--text2);margin-bottom:6px}
    .settings-drop .s-btn{padding:6px 14px;border:1px solid var(--card-border);border-radius:20px;background:var(--input-bg);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
    .settings-drop .s-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .settings-drop .color-dots{display:flex;gap:8px}
    .settings-drop .color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
    .settings-drop .color-dot.active{border-color:var(--text);transform:scale(1.15)}

    /* Chat area */
    .chat-area{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:12px 14px;-webkit-overflow-scrolling:touch;background:var(--bg);touch-action:pan-y}
    .messages{display:flex;flex-direction:column;gap:14px;padding-bottom:8px}

    .welcome{text-align:center;padding:60px 20px 30px}
    .welcome .wicon{font-size:52px;margin-bottom:10px}
    .welcome h2{font-size:18px;font-weight:600;margin-bottom:6px}
    .welcome p{font-size:13px;color:var(--text2);margin-bottom:24px}
    .quick-prompts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:340px;margin:0 auto}
    .quick-btn{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);padding:12px 10px;border-radius:12px;font-size:12px;cursor:pointer;text-align:left;transition:all .15s}
    .quick-btn:active{background:var(--input-bg)}

    /* Bubbles */
    .msg{display:flex;gap:8px;padding:0;animation:msgIn .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    .msg.user{flex-direction:row-reverse}
    .msg-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;overflow:hidden;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:20px}
    .msg-avatar img{width:100%;height:100%;object-fit:cover}
    .msg-body{max-width:72%;min-width:0;display:flex;flex-direction:column}
    .msg.no-avatar{gap:0}
    .msg.no-avatar .msg-body{max-width:82%}
    .msg.user .msg-body{align-items:flex-end}
    .msg.ai .msg-body{align-items:flex-start}
    .msg-content{font-size:16px;line-height:1.55;word-break:break-word;padding:11px 14px;border-radius:20px;position:relative}
    .msg.ai .msg-content{background:var(--ai-bubble);border-radius:4px 20px 20px 20px;box-shadow:var(--bubble-shadow)}
    .msg.user .msg-content{background:var(--user-bubble);border-radius:20px 4px 20px 20px}
    .msg-content p{margin:0}.msg-content p+p{margin-top:4px}
    .msg-content pre{background:rgba(0,0,0,0.06);border-radius:10px;padding:12px;overflow-x:auto;font-size:13px;margin:6px 0}
    .msg-content code{font-family:"SF Mono","Fira Code",monospace;font-size:.9em}
    .msg-content :not(pre)>code{background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px}
    .msg-actions{margin-top:4px;opacity:0;transition:opacity .2s}
    .msg:active .msg-actions{opacity:1}
    .btn-copy{background:none;border:none;color:var(--text2);font-size:10px;cursor:pointer;padding:2px 6px}

    .typing-dots{display:flex;gap:5px;padding:8px 4px 8px 46px;align-items:center}
    .typing-dots.no-avatar{padding-left:8px}
    .typing-dots span{width:7px;height:7px;border-radius:50%;background:#aaa;opacity:.5;animation:bounce 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}
    .error{background:rgba(231,76,60,0.08);color:#e74c3c;padding:10px 14px;border-radius:14px;font-size:12px;margin:6px 0}

    /* Input bar */
    .input-bar{flex-shrink:0;background:var(--nav-bg);border-top:1px solid var(--card-border);padding:6px 10px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 24px rgba(0,0,0,0.08)}
    .input-tools{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;justify-content:center}
    .input-tool{display:flex;align-items:center;gap:3px;padding:4px 9px;border:none;border-radius:14px;background:rgba(0,0,0,0.04);color:var(--text2);cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;transition:all .15s}
    .input-tool:active{transform:scale(.95)}
    .input-tool.on{background:var(--accent);color:#fff}
    .input-tool svg{width:13px;height:13px;flex-shrink:0}
    .input-row{display:flex;align-items:flex-end;gap:6px;background:var(--input-bg);border:2px solid var(--input-border);border-radius:24px;padding:3px 6px 3px 12px;box-shadow:0 2px 12px rgba(0,0,0,0.05);transition:border-color .2s}
    .btn-attach{width:36px;height:36px;border:none;border-radius:50%;background:var(--input-bg);color:var(--text2);font-size:18px;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .btn-attach:active{background:var(--input-border);transform:scale(.92)}
    .file-preview{display:flex;gap:6px;flex-wrap:wrap;padding:6px 0 0 0}
    .file-chip{display:flex;align-items:center;gap:5px;background:var(--input-bg);border:1px solid var(--card-border);border-radius:12px;padding:4px 10px 4px 6px;font-size:11px;color:var(--text);max-width:180px}
    .file-chip img{width:26px;height:26px;border-radius:6px;object-fit:cover;flex-shrink:0}
    .file-chip .fc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .file-chip .fc-del{cursor:pointer;color:var(--text2);font-size:14px;line-height:1;padding:2px;flex-shrink:0}
    .file-chip .fc-del:active{color:#e74c3c}
    .input-field{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:16px;line-height:1.4;resize:none;max-height:110px;padding:8px 4px;font-family:inherit}
    .input-field:focus{outline:none}
    .input-field::placeholder{color:#bbb}
    .btn-send{width:42px;height:42px;border:none;border-radius:50%;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;transition:all .15s;box-shadow:0 2px 8px rgba(74,144,217,0.25)}
    .btn-send:active{transform:scale(.9);opacity:.9}
    .btn-send:disabled{background:#ccc;box-shadow:none}
    .input-hint{text-align:center;font-size:10px;color:#bbb;margin-top:4px}

    ::-webkit-scrollbar{width:0}

    /* Screen transitions */
    #inviteScreen,#modelScreen{animation:fadeInUp .35s ease}
    #chatView{animation:fadeInUp .3s ease}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .model-card{animation:cardIn .3s ease backwards}
    .model-card:nth-child(1){animation-delay:.05s}
    .model-card:nth-child(2){animation-delay:.1s}
    .model-card:nth-child(3){animation-delay:.15s}
    .model-card:nth-child(4){animation-delay:.2s}
    @keyframes cardIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}


    /* Clear history btn */
    .s-btn.danger{color:#e74c3c;border-color:rgba(231,76,60,0.2)}
    .s-btn.danger:active{background:rgba(231,76,60,0.08)}

  </style>
</head>
<body>

<!-- INVITE -->
<div id="inviteScreen">
  <div class="logo"><img src="swai-icon.png" style="width:72px;height:72px;border-radius:50%;object-fit:cover;box-shadow:0 4px 16px rgba(74,144,217,0.3)"></div>
  <h2>SeaWhy AI</h2>
  <p class="sub">请输入邀请码</p>
  <input type="text" class="invite-input" id="inviteCode" placeholder="******" maxlength="10" autofocus />
  <button class="invite-btn" onclick="checkInvite()">进入</button>
  <button class="invite-skip" onclick="enterAsGuest()">无邀请码，使用基础模型</button>
  <div class="invite-err" id="inviteErr"></div>
  <div class="invite-info">SeaWhy AI · 网页由ccy制作</div>
</div>

<!-- MODEL SELECT -->
<div id="modelScreen">
  <div class="logo"><img src="swai-icon.png" style="width:72px;height:72px;border-radius:50%;object-fit:cover;box-shadow:0 4px 16px rgba(74,144,217,0.3)"></div>
  <h2>SeaWhy AI</h2>
  <p class="sub">选择模型开始对话</p>
  <div class="model-cards" id="modelCards">
    <div class="model-card" onclick="enterChat('swai')">
      <div class="mc-avatar"><img src="swai-icon.png" /></div>
      <div class="mc-name">Swai v1.5</div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chatView">
  <div class="wx-nav">
    <button class="back" onclick="goBack()">← 返回</button>
    <span class="title" id="chatTitle">Chat</span>
    <div class="right-btn" id="btnSettings" onclick="toggleSettings()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <div class="settings-drop" id="settingsDrop">
        <div class="s-label">🌓 主题模式</div>
        <div class="s-row">
          <button class="s-btn active" onclick="setTheme('light',this)">☀️ 浅色</button>
          <button class="s-btn" onclick="setTheme('dark',this)">🌙 深色</button>
        </div>
        <div class="s-label" style="margin-top:8px">🧹 数据</div>
        <div class="s-row">
          <button class="s-btn danger" onclick="clearHistory()">🗑 清空聊天</button>
        </div>
        <div class="s-label" style="margin-top:8px">💬 气泡颜色</div>
        <div class="color-dots">
          <span class="color-dot" style="background:#95EC69" onclick="setBubble('#95EC69',this)" title="微信绿"></span>
          <span class="color-dot" style="background:#07C160" onclick="setBubble('#07C160',this)" title="深绿"></span>
          <span class="color-dot active" style="background:#C5DFF8" onclick="setBubble('#C5DFF8',this)" title="浅蓝"></span>
          <span class="color-dot" style="background:#4A90D9" onclick="setBubble('#4A90D9',this)" title="蓝色"></span>
          <span class="color-dot" style="background:#FF6B6B" onclick="setBubble('#FF6B6B',this)" title="珊瑚"></span>
          <span class="color-dot" style="background:#F5A623" onclick="setBubble('#F5A623',this)" title="橙色"></span>
          <span class="color-dot" style="background:#A78BFA" onclick="setBubble('#A78BFA',this)" title="紫色"></span>
        </div>
      </div>
    </div>
  </div>
  <main class="chat-area" id="chatArea">
    <div class="messages" id="messages"></div>
    <div class="typing-dots" id="typing" style="display:none"><span></span><span></span><span></span></div>
  </main>
  <footer class="input-bar">
    <div class="input-tools" id="inputTools" style="display:flex">
      <button class="input-tool on" id="btnToggleMode" onclick="toggleMode()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>严谨客观</button>
      <button class="input-tool" id="btnPro" onclick="togglePro()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>PRO</button>
      <button class="input-tool" id="btnSearchQA" onclick="toggleSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>联网</button>
      <button class="input-tool" onclick="sendQuick('joke')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>笑话</button>
      <button class="input-tool" onclick="sendQuick('story')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>故事</button>
      <button class="input-tool" onclick="sendQuick('word')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>单词</button>
    </div>
    <div class="file-preview" id="filePreview"></div>
    <div class="input-row">
      <button class="btn-attach" id="btnAttach" title="上传图片或文件">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <textarea id="userInput" class="input-field" placeholder="输入消息…" rows="1"></textarea>
      <button class="btn-send" id="btnSend">↑</button>

  d.style.cssText = "text-align:center;padding:12px;font-size:13px;color:var(--accent);animation:fadeIn .2s ease";
  d.textContent = hint;
  dom.messages.appendChild(d);
  scrollBottom();
}

function sendQuick(type) {
  if (streaming) return;
  if (type === "joke") {
    sendMsg("给我讲一个好笑的笑话，要真的好笑那种！");
  } else if (type === "story") {
    sendMsg("给我讲一个有趣的小故事吧，什么题材都行");
  } else if (type === "word") {
    sendMsg("现在和我玩背单词游戏！你随机出一个英语四六级高频核心词汇（只给英文单词，不要给中文），然后问我'这个单词是什么意思？'。等我回答后，你公布正确答案（中文意思+词性），并简单解释这个词的常见用法、词根联想和固定搭配。如果我答对了就夸我，答错了就温柔纠正。好，开始吧！先说单词！");
  }
}

function togglePro() {
  proMode = !proMode;
  var btn = document.getElementById("btnPro");
  if (btn) { btn.classList.toggle("on", proMode); btn.title = proMode ? "PRO: deepseek-chat" : "PRO: 关闭"; }
}

function toggleSearch() {
  webSearch = !webSearch;
  var btn = document.getElementById("btnSearchQA");
  if (btn) { btn.classList.toggle("on", webSearch); btn.title = webSearch ? "联网搜索：开" : "联网搜索：关"; }
}

function clearHistory() {
  if (!currentModel || messages.length === 0) return;
  if (!confirm("确定要清空当前聊天记录吗？此操作不可撤销。")) return;
  messages.length = 0;  // clears the live reference directly
  saveMsgs();
  renderAllMessages();
  dom.settingsDrop.classList.remove("show");
}

// ===== API =====
function sendMsg(text) {
  if (streaming) return;
  text = text.trim();
  var hasFiles = pendingFiles.length > 0;
  if (!text && !hasFiles) return;
  var sessionId = chatSessionId;
  var chatArray = messages;        // captured reference — always pushes to the right cache slot
  var capturedModel = currentModel; // for save key, survives goBack's currentModel=null
  var capturedKey = msgsKey;
  streaming = true; dom.btnSend.disabled = true; dom.typing.style.display = "flex"; scrollBottom();

  // Build display content for user bubble
  var displayContent = text || "";
  var hasImages = false;
  for (var fi = 0; fi < pendingFiles.length; fi++) {
    if (pendingFiles[fi].type === "image") hasImages = true;
  }
  if (hasFiles) {
    var fileNames = pendingFiles.map(function(f){return f.name}).join(", ");
    if (text) displayContent = text + "\n\n📎 " + fileNames;
    else displayContent = "📎 " + fileNames;
  }

  // Build API content — images are NOT sent (DeepSeek lacks vision support)
  var filesToSend = pendingFiles.slice(); // capture BEFORE clearing — used below

  var apiContent = text || "";
  var hasTextFiles = false;
  for (var fj = 0; fj < filesToSend.length; fj++) {
    var f = filesToSend[fj];
    if (f.type === "text") {
      hasTextFiles = true;
      if (apiContent) apiContent += "\n\n";
      apiContent += "[文件: "+f.name+"]\n"+f.data;
    } else if (f.type === "image" && f.ocrText) {
      if (apiContent) apiContent += "\n\n";
      apiContent += "[图片OCR: "+f.name+"]\n"+f.ocrText;
    }
  }
  chatArray.push({role:"user", content:displayContent, rawContent: hasTextFiles ? apiContent : null});

  renderMsg("user", displayContent); saveMsgsKey(capturedKey);
  pendingFiles = [];
  renderFilePreview();

  var M = MODELS[currentModel];
  var showAiAvatar = currentModel !== "swai";
  var msgDiv = document.createElement("div"); msgDiv.className = "msg ai" + (showAiAvatar ? "" : " no-avatar");
  var contentDiv = document.createElement("div"); contentDiv.className = "msg-content"; contentDiv.textContent = " ";
  msgDiv.innerHTML = (showAiAvatar ? '<div class="msg-avatar">'+M.avatar+'</div>' : '') + '<div class="msg-body"></div>';
  msgDiv.querySelector(".msg-body").appendChild(contentDiv);
  dom.messages.appendChild(msgDiv); scrollBottom(); dom.typing.style.display = "none";

  var fullContent = "", resolved = false;
  var apiMsgs = [];
  for (var i = 0; i < messages.length; i++) {
    var c = messages[i].rawContent || messages[i].content;
    apiMsgs.push({role:messages[i].role, content:c});
  }
  var sysP = (currentModel === "swai" && swaiMode === "gentle") ? MODELS[currentModel].gentlePrompt : MODELS[currentModel].sysPrompt;
  if (webSearch && sysP) {
    sysP += "\n\n[知识增强模式] 用户需要更全面深入的回答。请调用你训练数据中最新的知识，尽可能给出准确、详尽、有时效性的回答。对于不确定的信息要诚实说明知识截止日期。";
  }
  if (sysP) apiMsgs.unshift({role:"system", content:sysP});

  abortController = new AbortController();
  var signal = abortController.signal;

  fetch("https://api.deepseek.com/v1/chat/completions", {
    method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
    body:JSON.stringify({model:proMode?"deepseek-chat":API_MODEL, messages:apiMsgs, stream:true, temperature:0.7, max_tokens:4096}),
    signal:signal
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t){throw new Error("API "+resp.status+": "+t.slice(0,200))});
    var reader = resp.body.getReader(), decoder = new TextDecoder(), buf = "";
    function pump() {
      if (resolved || chatSessionId !== sessionId) return;
      reader.read().then(function(result) {
        if (resolved || chatSessionId !== sessionId) return;
        if (result.done) {
          resolved = true; abortController = null;
          var finalText = fullContent || "…";
          if (chatSessionId === sessionId) { chatArray.push({role:"assistant", content:finalText}); saveMsgsKey(capturedKey); }
          contentDiv.innerHTML = renderMD(finalText); hl();
          var act = document.createElement("div"); act.className = "msg-actions"; act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
          msgDiv.querySelector(".msg-body").appendChild(act);
          streaming = false; dom.btnSend.disabled = false;
          return;
        }
        buf += decoder.decode(result.value, {stream:true});
        var lines = buf.split("\n"); buf = lines.pop() || "";
        for (var i = 0; i < lines.length; i++) {
          var s = lines[i].trim(); if (!s.startsWith("data:")) continue;
          var data = s.slice(5).trim(); if (data === "[DONE]") continue;
          try { var p = JSON.parse(data); var d = (p.choices||[{}])[0].delta; if (!d) continue; var t = d.content||""; if (t) { fullContent += t; contentDiv.textContent = fullContent; scrollBottom(); } } catch(e) {}
        }
        pump();
      }).catch(function(e) {
        if (resolved || chatSessionId !== sessionId) return;
        resolved = true; abortController = null;
        if (fullContent && chatSessionId === sessionId) {
          chatArray.push({role:"assistant", content:fullContent}); saveMsgsKey(capturedKey);
          var act = document.createElement("div"); act.className = "msg-actions"; act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
          msgDiv.querySelector(".msg-body").appendChild(act);
        } else if (!fullContent) {
          if (!(e && e.name === "AbortError")) msgDiv.remove();
        }
        streaming = false; dom.btnSend.disabled = false; dom.typing.style.display = "none";
      });
    }
    pump();
  }).catch(function(e) {
    if (resolved || chatSessionId !== sessionId) return;
    resolved = true; abortController = null;
    if (fullContent && chatSessionId === sessionId) {
      chatArray.push({role:"assistant", content:fullContent}); saveMsgsKey(capturedKey);
      contentDiv.innerHTML = renderMD(fullContent); hl();
      var act = document.createElement("div"); act.className = "msg-actions"; act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
      msgDiv.querySelector(".msg-body").appendChild(act);
    } else if (!fullContent) {
      if (!(e && e.name === "AbortError")) { showErr(e.message); msgDiv.remove(); }
    }
    streaming = false; dom.btnSend.disabled = false; dom.typing.style.display = "none";
  });
}

function showErr(msg) { var d = document.createElement("div"); d.className = "error"; d.textContent = "⚠ "+msg; dom.messages.appendChild(d); scrollBottom(); }
function saveMsgs() {
  if (!msgsKey || messages.length === 0) return;
  try {
    var clone = messages.map(function(m){return {role:m.role, content:m.content}});
    var json = JSON.stringify(clone);
    localStorage.setItem(msgsKey, json);
    try { sessionStorage.setItem(msgsKey, json); } catch(e) {}
  } catch(e) {}
}

function saveMsgsKey(key) {  // for async handlers with captured key
  if (!key) return;
  var modelId = key.replace("chat-msgs-","");
  var arr = messageCache[modelId] || messages;
  if (!arr || arr.length === 0) return;
  try {
    var clone = arr.map(function(m){return {role:m.role, content:m.content}});
    var json = JSON.stringify(clone);
    localStorage.setItem(key, json);
    try { sessionStorage.setItem(key, json); } catch(e) {}
  } catch(e) {}
}

function loadMsgs(key) {
  var arr = [];
  try {
    var s = sessionStorage.getItem(key) || localStorage.getItem(key);
    if (s) { var p = JSON.parse(s); if (Array.isArray(p) && p.length > 0) arr = p; }
  } catch(e) {}
  return arr;
}

// ===== EVENTS =====
dom.btnSend.addEventListener("click", function() { var t = dom.userInput.value.trim(); if ((!t && pendingFiles.length === 0) || streaming) return; dom.userInput.value = ""; dom.userInput.style.height = "auto"; sendMsg(t); });
dom.userInput.addEventListener("keydown", function(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); var t = dom.userInput.value.trim(); if (!t && pendingFiles.length === 0) return; if (streaming) return; dom.userInput.value = ""; dom.userInput.style.height = "auto"; sendMsg(t); } });
dom.userInput.addEventListener("input", function() { this.style.height = "auto"; this.style.height = Math.min(this.scrollHeight, 110) + "px"; });

// File upload
document.getElementById("btnAttach").addEventListener("click", function() { document.getElementById("fileInput").click(); });
document.getElementById("fileInput").addEventListener("change", function(e) {
  var files = e.target.files;
  if (!files || files.length === 0) return;
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      if (pendingFiles.length >= 5) return;
      var ext = file.name.split(".").pop().toLowerCase();
      var isPDF = ext === "pdf";
      var isDOCX = ext === "docx" || ext === "doc";
      var isImage = file.type.startsWith("image/");
      var reader = new FileReader();
      reader.onload = function(ev) {
        if (isPDF) {
          extractPDF(ev.target.result, file.name);
        } else if (isDOCX) {
          extractDOCX(ev.target.result, file.name);
        } else if (isImage) {
          // Run OCR on the image
          var imgData = ev.target.result;
          var placeholderIdx = pendingFiles.length;
          pendingFiles.push({name: file.name, data: imgData, type: "image", mime: file.type, ocrStatus: "识别中…"});
          renderFilePreview();
          runOCR(imgData, file.name, placeholderIdx);
        } else {
          // Plain text file
          var data = ev.target.result.split(",")[1];
          try { data = atob(data); } catch(ex) { data = ""; }
          pendingFiles.push({name: file.name, data: data, type: "text", mime: file.type});
          renderFilePreview();
        }
      };
      if (isPDF || isDOCX) {
        reader.readAsArrayBuffer(file);
      } else if (isImage) {
        reader.readAsDataURL(file);
      } else {
        reader.readAsDataURL(file);
      }
    })(files[i]);
  }
  e.target.value = "";
});

// Lazy-load a script
function loadScript(url, cb) {
  var s = document.createElement("script");
  s.src = url;
  s.onload = cb;
  s.onerror = function(){ cb(new Error("load failed")) };
  document.head.appendChild(s);
}

// PDF text extraction — lazy-loads pdf.js
function extractPDF(arrayBuffer, fileName) {
  if (typeof pdfjsLib !== "undefined") { doExtractPDF(arrayBuffer, fileName); return; }
  pendingFiles.push({name: fileName, data: null, type: "text", ocrStatus: "加载PDF引擎…"});
  renderFilePreview();
  loadScript("https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js", function(err) {
    if (err) {
      pendingFiles[pendingFiles.length-1].data = "[PDF引擎加载失败]";
      pendingFiles[pendingFiles.length-1].ocrStatus = "失败";
      renderFilePreview();
      return;
    }
    pendingFiles.pop();
    doExtractPDF(arrayBuffer, fileName);
  });
}
function doExtractPDF(arrayBuffer, fileName) {
  try { pdfjsLib.GlobalWorkerOptions.workerSrc = ""; } catch(e) {}
  pdfjsLib.getDocument({data: arrayBuffer}).promise.then(function(pdf) {
    var totalPages = Math.min(pdf.numPages, 30);
    var pages = [];
    function loadPage(n) {
      if (n > totalPages) {
        var extracted = pages.join("\n---\n");
        pendingFiles.push({name: fileName, data: extracted.substring(0, 30000), type: "text"});
        renderFilePreview();
        return;
      }
      pdf.getPage(n).then(function(page) {
        page.getTextContent().then(function(textContent) {
          var pageText = textContent.items.map(function(item){return item.str}).join(" ");
          if (pageText.trim()) pages.push("[第"+n+"页] "+pageText);
          loadPage(n + 1);
        }).catch(function(){ loadPage(n + 1); });
      }).catch(function(){ loadPage(n + 1); });
    }
    loadPage(1);
  }).catch(function(e) {
    pendingFiles.push({name: fileName, data: "[PDF解析失败: "+e.message+"]", type: "text"});
    renderFilePreview();
  });
}

// OCR image text extraction — lazy-loads Tesseract.js
function runOCR(imgDataUrl, fileName, idx) {
  if (typeof Tesseract !== "undefined") { doOCR(imgDataUrl, fileName, idx); return; }
  pendingFiles[idx].ocrStatus = "加载引擎…";
  renderFilePreview();
  loadScript("https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js", function(err) {
    if (err || typeof Tesseract === "undefined") {
      pendingFiles[idx].ocrText = "[OCR引擎加载失败]";
      pendingFiles[idx].ocrStatus = "失败";
      renderFilePreview();
      return;
    }
    doOCR(imgDataUrl, fileName, idx);
  });
}
function doOCR(imgDataUrl, fileName, idx) {
  Tesseract.recognize(imgDataUrl, "chi_sim+eng", {
    logger: function(m) {
      if (m.status === "recognizing text") {
        var pct = Math.round(m.progress * 100);
        pendingFiles[idx].ocrStatus = "识别中 " + pct + "%";
        renderFilePreview();
      }
    }
  }).then(function(result) {
    var text = result.data.text.trim();
    pendingFiles[idx].ocrText = text || "[图片中未识别到文字]";
    pendingFiles[idx].ocrStatus = "已识别";
    renderFilePreview();
  }).catch(function(e) {
    pendingFiles[idx].ocrText = "[OCR失败: " + e.message + "]";
    pendingFiles[idx].ocrStatus = "失败";
    renderFilePreview();
  });
}

// DOCX text extraction — lazy-loads mammoth.js
function extractDOCX(arrayBuffer, fileName) {
  if (typeof mammoth !== "undefined") { doExtractDOCX(arrayBuffer, fileName); return; }
  pendingFiles.push({name: fileName, data: null, type: "text", ocrStatus: "加载Word引擎…"});
  renderFilePreview();
  loadScript("https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js", function(err) {
    if (err || typeof mammoth === "undefined") {
      pendingFiles[pendingFiles.length-1].data = "[Word引擎加载失败]";
      pendingFiles[pendingFiles.length-1].ocrStatus = "失败";
      renderFilePreview();
      return;
    }
    pendingFiles.pop();
    doExtractDOCX(arrayBuffer, fileName);
  });
}
function doExtractDOCX(arrayBuffer, fileName) {
  mammoth.extractRawText({arrayBuffer: arrayBuffer}).then(function(result) {
    var text = result.value.substring(0, 30000);
    pendingFiles.push({name: fileName, data: text || "[Word文档无文字内容]", type: "text"});
    renderFilePreview();
  }).catch(function(e) {
    pendingFiles.push({name: fileName, data: "[Word解析失败: "+e.message+"]", type: "text"});
    renderFilePreview();
  });
}

function renderFilePreview() {
  var container = document.getElementById("filePreview");
  var html = "";
  for (var i = 0; i < pendingFiles.length; i++) {
    var f = pendingFiles[i];
    html += '<div class="file-chip">';
    if (f.type === "image") {
      html += '<img src="'+escAttr(f.data)+'" alt="">';
    } else {
      html += '<span style="font-size:16px">📄</span>';
    }
    html += '<span class="fc-name">'+escHtml(f.name);
    if (f.ocrStatus) html += ' <span style="color:var(--accent);font-size:10px">'+escHtml(f.ocrStatus)+'</span>';
    html += '</span>';
    html += '<span class="fc-del" onclick="removeFile('+i+')">×</span>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  renderFilePreview();
}

function escAttr(s) { return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escHtml(s) { var d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

// ===== PERSISTENCE =====
function persistAll() {
  // Save ALL chats to both storages
  var models = Object.keys(messageCache);
  for (var i = 0; i < models.length; i++) {
    var key = "chat-msgs-" + models[i];
    var arr = messageCache[models[i]];
    if (arr && arr.length > 0) {
      var clone = arr.map(function(m){return {role:m.role, content:m.content}});
      var json = JSON.stringify(clone);
      try { localStorage.setItem(key, json); } catch(e) {}
      try { sessionStorage.setItem(key, json); } catch(e) {}
    }
  }
}

window.addEventListener("beforeunload", function() { persistAll(); });
document.addEventListener("visibilitychange", function() {
  if (document.hidden) persistAll();
});

// ===== ERROR CATCH =====
window.addEventListener("error", function(e) {
  var el = document.getElementById("messages");
  if (el) {
    var d = document.createElement("div");
    d.className = "error";
    d.textContent = "⚠ JS错误: " + (e.message || e.error || "unknown") + " @ " + (e.filename||"").split("/").pop() + ":" + e.lineno;
    el.appendChild(d);
  }
});

// ===== PWA =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function(){});
}

// ===== INIT =====
applyAppearance();
</script>
