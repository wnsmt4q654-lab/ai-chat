<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#EDEDED" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>SeaWhy AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link id="hlTheme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-light.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
    :root{
      --bg:#f0f4f8;--nav-bg:rgba(255,255,255,0.72);--card-bg:rgba(255,255,255,0.78);--card-border:rgba(0,0,0,0.06);
      --text:#111;--text2:#888;--input-bg:rgba(255,255,255,0.85);--input-border:rgba(0,0,0,0.1);
      --ai-bubble:rgba(255,255,255,0.8);--user-bubble:#8BB8EA;--bubble-shadow:0 1px 4px rgba(0,0,0,0.05);
      --invite-bg:#f0f4f8;--accent:#4A90D9;--accent-light:rgba(74,144,217,0.12);
    }
    body.dark{
      --bg:#111;--nav-bg:#1a1a1a;--card-bg:#1a1a1a;--card-border:#333;
      --text:#e5e5e5;--text2:#999;--input-bg:#222;--input-border:#333;
      --ai-bubble:#262626;--user-bubble:#054740;--bubble-shadow:none;
      --invite-bg:#111;--accent:#4A90D9;--accent-light:rgba(74,144,217,0.18);
    }
    body{display:flex;flex-direction:column;background:var(--bg)}

    /* ===== INVITE ===== */
    #inviteScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center;background:var(--invite-bg)}
    #inviteScreen .logo{font-size:64px;margin-bottom:12px}
    #inviteScreen h2{font-size:22px;font-weight:700;margin-bottom:6px}
    #inviteScreen .sub{font-size:13px;color:var(--text2);margin-bottom:28px}
    .invite-input{width:100%;max-width:280px;padding:15px 20px;border:2px solid var(--input-border);border-radius:28px;font-size:18px;text-align:center;letter-spacing:4px;outline:none;font-family:inherit;background:var(--input-bg);color:var(--text);margin-bottom:14px;transition:all .2s}
    .invite-input:focus{border-color:var(--accent)}
    .invite-btn{width:100%;max-width:280px;padding:15px;border:none;border-radius:28px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;color:#fff;transition:all .15s}
    .invite-btn:active{opacity:.8;transform:scale(.98)}
    .invite-btn{background:var(--accent)}
    .invite-skip{width:100%;max-width:280px;padding:12px;border:none;border-radius:28px;font-size:13px;cursor:pointer;background:transparent;color:var(--text2)}
    .invite-err{color:#e74c3c;font-size:12px;margin-top:4px;min-height:18px}
    .invite-info{font-size:10px;color:#bbb;margin-top:20px}

    /* ===== MODEL SCREEN ===== */
    #modelScreen{flex:1;overflow-y:auto;padding:40px 20px 30px;text-align:center;background:var(--invite-bg);display:none}
    #modelScreen .logo{font-size:64px;margin-bottom:12px}
    #modelScreen h2{font-size:22px;font-weight:700;margin-bottom:6px}
    #modelScreen .sub{font-size:14px;color:var(--text2);margin-bottom:32px}
    .model-cards{max-width:320px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
    .model-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:15px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
    .model-card:active{background:var(--input-bg);transform:scale(.98)}
    .mc-avatar{width:50px;height:50px;border-radius:50%;flex-shrink:0;overflow:hidden}
    .mc-avatar img{width:100%;height:100%;object-fit:cover}
    .mc-name{font-size:17px;font-weight:500}
    .mc-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500;margin-left:auto;flex-shrink:0}
    .mc-badge.rec{background:var(--accent-light);color:var(--accent)}
    .mc-badge.custom{background:rgba(0,0,0,0.05);color:var(--text2)}

    /* ===== CHAT ==== */
    #chatView{flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--bg)}

    /* Nav */
    .wx-nav{display:flex;align-items:center;padding:0 12px;height:46px;background:var(--nav-bg);flex-shrink:0;border-bottom:1px solid var(--card-border)}
    .wx-nav .back{font-size:15px;color:var(--text);cursor:pointer;padding:8px 6px;flex-shrink:0;width:56px;border:none;background:none;font-family:inherit}
    .wx-nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .wx-nav .right-btn{font-size:20px;color:var(--text);cursor:pointer;padding:8px;width:44px;text-align:center;flex-shrink:0;border:none;background:none;position:relative}

    /* Settings dropdown */
    .settings-drop{position:absolute;top:42px;right:4px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:14px 16px;min-width:180px;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,0.12);opacity:0;transform:translateY(-8px) scale(.95);pointer-events:none;transition:opacity .2s ease,transform .2s ease}
    .settings-drop.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
    .settings-drop .s-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:13px;color:var(--text)}
    .settings-drop .s-row:last-child{margin-bottom:0}
    .settings-drop .s-label{font-size:12px;color:var(--text2);margin-bottom:6px}
    .settings-drop .s-btn{padding:6px 14px;border:1px solid var(--card-border);border-radius:20px;background:var(--input-bg);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
    .settings-drop .s-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .settings-drop .color-dots{display:flex;gap:8px}
    .settings-drop .color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
    .settings-drop .color-dot.active{border-color:var(--text);transform:scale(1.15)}

    /* Chat area */
    .chat-area{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;background:var(--bg)}
    .messages{display:flex;flex-direction:column;gap:14px;padding-bottom:8px}

    .welcome{text-align:center;padding:60px 20px 30px}
    .welcome .wicon{font-size:52px;margin-bottom:10px}
    .welcome h2{font-size:18px;font-weight:600;margin-bottom:6px}
    .welcome p{font-size:13px;color:var(--text2);margin-bottom:24px}
    .quick-prompts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:340px;margin:0 auto}
    .quick-btn{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);padding:12px 10px;border-radius:12px;font-size:12px;cursor:pointer;text-align:left;transition:all .15s}
    .quick-btn:active{background:var(--input-bg)}

    /* Bubbles */
    .msg{display:flex;gap:8px;padding:0;animation:msgIn .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    .msg.user{flex-direction:row-reverse}
    .msg-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;overflow:hidden;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:20px}
    .msg-avatar img{width:100%;height:100%;object-fit:cover}
    .msg-body{max-width:72%;min-width:0;display:flex;flex-direction:column}
    .msg.user .msg-body{align-items:flex-end}
    .msg.ai .msg-body{align-items:flex-start}
    .msg-content{font-size:15px;line-height:1.5;word-break:break-word;padding:11px 14px;border-radius:20px;position:relative}
    .msg.ai .msg-content{background:var(--ai-bubble);border-radius:4px 20px 20px 20px;box-shadow:var(--bubble-shadow)}
    .msg.user .msg-content{background:var(--user-bubble);border-radius:20px 4px 20px 20px}
    .msg-content p{margin:0}.msg-content p+p{margin-top:4px}
    .msg-content pre{background:rgba(0,0,0,0.06);border-radius:10px;padding:12px;overflow-x:auto;font-size:13px;margin:6px 0}
    .msg-content code{font-family:"SF Mono","Fira Code",monospace;font-size:.9em}
    .msg-content :not(pre)>code{background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px}
    .msg-actions{margin-top:4px;opacity:0;transition:opacity .2s}
    .msg:active .msg-actions{opacity:1}
    .btn-copy{background:none;border:none;color:var(--text2);font-size:10px;cursor:pointer;padding:2px 6px}

    .typing-dots{display:flex;gap:5px;padding:8px 4px 8px 46px;align-items:center}
    .typing-dots span{width:7px;height:7px;border-radius:50%;background:#aaa;opacity:.5;animation:bounce 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}
    .error{background:rgba(231,76,60,0.08);color:#e74c3c;padding:10px 14px;border-radius:14px;font-size:12px;margin:6px 0}

    /* Input bar */
    .input-bar{flex-shrink:0;background:var(--nav-bg);border-top:1px solid var(--card-border);padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px))}
    .input-row{display:flex;align-items:flex-end;gap:10px}
    .input-field{flex:1;background:var(--input-bg);border:2px solid var(--input-border);border-radius:24px;outline:none;color:var(--text);font-size:15px;line-height:1.4;resize:none;max-height:110px;padding:10px 16px;font-family:inherit;transition:border-color .2s}
    .input-field:focus{border-color:var(--accent)}
    .input-field::placeholder{color:#bbb}
    .btn-send{width:44px;height:44px;border:none;border-radius:50%;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;transition:all .15s;box-shadow:0 2px 8px rgba(74,144,217,0.25)}
    .btn-send:active{transform:scale(.9);opacity:.9}
    .btn-send:disabled{background:#ccc;box-shadow:none}
    .input-hint{text-align:center;font-size:10px;color:#bbb;margin-top:6px}

    ::-webkit-scrollbar{width:0}

    /* Screen transitions */
    #inviteScreen,#modelScreen{animation:fadeInUp .35s ease}
    #chatView{animation:fadeInUp .3s ease}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .model-card{animation:cardIn .3s ease backwards}
    .model-card:nth-child(1){animation-delay:.05s}
    .model-card:nth-child(2){animation-delay:.1s}
    .model-card:nth-child(3){animation-delay:.15s}
    .model-card:nth-child(4){animation-delay:.2s}
    @keyframes cardIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}

    /* Quick actions bar */
    .quick-actions{display:flex;gap:8px;padding:8px 14px;flex-shrink:0;overflow-x:auto;background:var(--nav-bg);border-top:1px solid var(--card-border);-webkit-overflow-scrolling:touch}
    .quick-actions::-webkit-scrollbar{height:0}
    .qa-btn{flex-shrink:0;padding:7px 14px;border:1px solid var(--card-border);border-radius:18px;background:var(--card-bg);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .18s}
    .qa-btn:active{background:var(--input-bg);transform:scale(.96)}
    .qa-btn.accent{background:var(--accent-light);color:var(--accent);border-color:transparent;font-weight:500}
    .qa-btn.accent.on{background:var(--accent);color:#fff}

    /* Clear history btn */
    .s-btn.danger{color:#e74c3c;border-color:rgba(231,76,60,0.2)}
    .s-btn.danger:active{background:rgba(231,76,60,0.08)}

    /* Search toggle */
    .search-row{display:flex;justify-content:center;padding-top:8px}
    .search-toggle{padding:6px 14px;border:1px solid var(--card-border);border-radius:16px;background:var(--card-bg);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .18s;display:flex;align-items:center;gap:4px}
    .search-toggle:active{transform:scale(.96)}
    .search-toggle.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  </style>
</head>
<body>

<!-- INVITE -->
<div id="inviteScreen">
  <div class="logo"><img src="swai-icon.png" style="width:72px;height:72px;border-radius:50%;object-fit:cover;box-shadow:0 4px 16px rgba(74,144,217,0.3)"></div>
  <h2>SeaWhy AI</h2>
  <p class="sub">请输入邀请码</p>
  <input type="text" class="invite-input" id="inviteCode" placeholder="******" maxlength="10" autofocus />
  <button class="invite-btn" onclick="checkInvite()">进入</button>
  <button class="invite-skip" onclick="enterAsGuest()">无邀请码，使用基础模型</button>
  <div class="invite-err" id="inviteErr"></div>
  <div class="invite-info">SeaWhy AI · 网页由ccy制作</div>
</div>

<!-- MODEL SELECT -->
<div id="modelScreen">
  <div class="logo"><img src="swai-icon.png" style="width:72px;height:72px;border-radius:50%;object-fit:cover;box-shadow:0 4px 16px rgba(74,144,217,0.3)"></div>
  <h2>SeaWhy AI</h2>
  <p class="sub">选择模型开始对话</p>
  <div class="model-cards" id="modelCards">
    <div class="model-card" onclick="enterChat('swai')">
      <div class="mc-avatar"><img src="swai-icon.png" /></div>
      <div class="mc-name">Swai v1.0</div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chatView">
  <div class="wx-nav">
    <button class="back" onclick="goBack()">← 返回</button>
    <span class="title" id="chatTitle">Chat</span>
    <div class="right-btn" id="btnSettings" onclick="toggleSettings()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <div class="settings-drop" id="settingsDrop">
        <div class="s-label">🌓 主题模式</div>
        <div class="s-row">
          <button class="s-btn active" onclick="setTheme('light',this)">☀️ 浅色</button>
          <button class="s-btn" onclick="setTheme('dark',this)">🌙 深色</button>
        </div>
        <div class="s-label" style="margin-top:8px">🧹 数据</div>
        <div class="s-row">
          <button class="s-btn danger" onclick="clearHistory()">🗑 清空聊天</button>
        </div>
        <div class="s-label" style="margin-top:8px">💬 气泡颜色</div>
        <div class="color-dots">
          <span class="color-dot" style="background:#95EC69" onclick="setBubble('#95EC69',this)" title="微信绿"></span>
          <span class="color-dot" style="background:#07C160" onclick="setBubble('#07C160',this)" title="深绿"></span>
          <span class="color-dot active" style="background:#8BB8EA" onclick="setBubble('#8BB8EA',this)" title="浅蓝"></span>
          <span class="color-dot" style="background:#4A90D9" onclick="setBubble('#4A90D9',this)" title="蓝色"></span>
          <span class="color-dot" style="background:#FF6B6B" onclick="setBubble('#FF6B6B',this)" title="珊瑚"></span>
          <span class="color-dot" style="background:#F5A623" onclick="setBubble('#F5A623',this)" title="橙色"></span>
          <span class="color-dot" style="background:#A78BFA" onclick="setBubble('#A78BFA',this)" title="紫色"></span>
        </div>
      </div>
    </div>
  </div>
  <main class="chat-area" id="chatArea">
    <div class="messages" id="messages"></div>
    <div class="typing-dots" id="typing" style="display:none"><span></span><span></span><span></span></div>
  </main>
  <div class="quick-actions" id="quickActions" style="display:none">
    <button class="qa-btn accent" id="btnToggleMode" onclick="toggleMode()">切换模式</button>
    <button class="qa-btn" onclick="sendQuick('joke')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:3px"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>讲个笑话</button>
    <button class="qa-btn" onclick="sendQuick('story')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:3px"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>讲个故事</button>
    <button class="qa-btn" onclick="sendQuick('word')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:3px"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>背个单词</button>
  </div>
  <footer class="input-bar">
    <div class="input-row">
      <textarea id="userInput" class="input-field" placeholder="输入消息…" rows="1"></textarea>
      <button class="btn-send" id="btnSend">↑</button>
    </div>
    <div class="search-row">
      <button class="search-toggle" id="btnSearch" onclick="toggleSearch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        联网搜索
      </button>
    </div>
    <p class="input-hint">SeaWhy AI · 网页由ccy制作</p>
  </footer>
</div>

<script>

var API_KEY = "sk-e9168099b0f24e0a948cbd9b98038d8e";

function applyAppearance() {
  document.body.classList.toggle("dark", userTheme === "dark");
  document.documentElement.style.setProperty("--user-bubble", userBubble);
  // Update settings UI
  var drop = document.getElementById("settingsDrop");
  if (drop) {
    drop.querySelectorAll(".s-btn").forEach(function(b) {
      b.classList.toggle("active", (b.textContent.includes("浅色") && userTheme==="light") || (b.textContent.includes("深色") && userTheme==="dark"));
    });
    drop.querySelectorAll(".color-dot").forEach(function(d) {
      d.classList.toggle("active", d.style.backgroundColor === userBubble || rgbToHex(d.style.backgroundColor) === userBubble.toUpperCase());
    });
  }
}

function rgbToHex(rgb) {
  if (!rgb) return "";
  var m = rgb.match(/\d+/g);
  if (!m) return "";
  return "#" + m.slice(0,3).map(function(x){var h=parseInt(x).toString(16);return h.length===1?"0"+h:h}).join("").toUpperCase();
}

function enterChat(modelId) {
  chatSessionId++;
  if (abortController) { try { abortController.abort(); } catch(e) {} abortController = null; }
  streaming = false; dom.btnSend.disabled = false; dom.typing.style.display = "none";
  currentModel = modelId;
  msgsKey = "chat-msgs-" + modelId;
  // 1) 优先内存缓存 — 这才是最可靠的（解决气泡消失的核心）
  if (messageCache[modelId] && messageCache[modelId].length > 0) {
    messages = messageCache[modelId].slice();
    console.log("enterChat model="+modelId+" fromCache="+messages.length+" msgs");
  } else {
    // 2) 其次 localStorage（页面刷新后恢复）
    messages = [];
    try {
      var saved = localStorage.getItem(msgsKey);
      if (saved) { var p = JSON.parse(saved); if (Array.isArray(p) && p.length > 0) messages = p; }
    } catch(e) { console.error("loadMsgs err:", e); messages = []; }
    console.log("enterChat model="+modelId+" fromLS="+messages.length+" msgs");
  }
  var M = MODELS[modelId];
  dom.chatTitle.textContent = M.title;
  dom.modelScreen.style.display = "none";
  dom.chatView.style.display = "flex";
  // Show quick actions only for Swai
  var qa = document.getElementById("quickActions");
  if (qa) { qa.style.display = modelId === "swai" ? "flex" : "none"; }
  updateModeBtn();
  renderAllMessages();
}

function goBack() {
  chatSessionId++;  // invalidate any in-flight stream handlers
  // Save to memory cache — this is the primary persistence mechanism
  if (currentModel && messages.length > 0) {
    messageCache[currentModel] = messages.slice();
  }
  saveMsgs();       // also persist to localStorage for page-refresh recovery
  if (abortController) { try { abortController.abort(); } catch(e) {} abortController = null; }
  dom.chatView.style.display = "none"; dom.modelScreen.style.display = "block"; currentModel = null;
  streaming = false; dom.btnSend.disabled = false; dom.typing.style.display = "none";

  var sysP = (currentModel === "swai" && swaiMode === "gentle") ? MODELS[currentModel].gentlePrompt : MODELS[currentModel].sysPrompt;
  if (webSearch && sysP) {
    sysP += "\n\n[联网搜索模式已开启] 用户开启了联网搜索。如果遇到需要最新信息、实时数据的问题，请尽量给出当前可用的最佳答案。对于明确需要搜索的内容，可以告诉用户你无法直接联网，但可以提供你所知道的最新信息。";
  }
  if (sysP) apiMsgs.unshift({role:"system", content:sysP});

  abortController = new AbortController();
  var signal = abortController.signal;

  fetch("https://api.deepseek.com/v1/chat/completions", {
    method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
    body:JSON.stringify({model:API_MODEL, messages:apiMsgs, stream:true, temperature:0.7, max_tokens:4096}),
    signal:signal
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t){throw new Error("API "+resp.status+": "+t.slice(0,200))});
    var reader = resp.body.getReader(), decoder = new TextDecoder(), buf = "";
    function pump() {
      if (resolved || chatSessionId !== sessionId) return;
      reader.read().then(function(result) {
        if (resolved || chatSessionId !== sessionId) return;
        if (result.done) {
          resolved = true; abortController = null;
          var finalText = fullContent || "…";
          if (chatSessionId === sessionId) { messages.push({role:"assistant", content:finalText}); saveMsgs(); }
          contentDiv.innerHTML = renderMD(finalText); hl();
          var act = document.createElement("div"); act.className = "msg-actions"; act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
          msgDiv.querySelector(".msg-body").appendChild(act);
          streaming = false; dom.btnSend.disabled = false;
          return;
        }
        buf += decoder.decode(result.value, {stream:true});
        var lines = buf.split("\n"); buf = lines.pop() || "";
        for (var i = 0; i < lines.length; i++) {
          var s = lines[i].trim(); if (!s.startsWith("data:")) continue;
          var data = s.slice(5).trim(); if (data === "[DONE]") continue;
          try { var p = JSON.parse(data); var d = (p.choices||[{}])[0].delta; if (!d) continue; var t = d.content||""; if (t) { fullContent += t; contentDiv.textContent = fullContent; scrollBottom(); } } catch(e) {}
        }
        pump();
      }).catch(function(e) {
        if (resolved || chatSessionId !== sessionId) return;
        resolved = true; abortController = null;
        if (fullContent && chatSessionId === sessionId) {
          messages.push({role:"assistant", content:fullContent}); saveMsgs();
          contentDiv.innerHTML = renderMD(fullContent); hl();
          var act = document.createElement("div"); act.className = "msg-actions"; act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
          msgDiv.querySelector(".msg-body").appendChild(act);
        } else if (!fullContent) {
          if (!(e && e.name === "AbortError")) msgDiv.remove();
        }
        streaming = false; dom.btnSend.disabled = false; dom.typing.style.display = "none";
      });
    }
    pump();
  }).catch(function(e) {
    if (resolved || chatSessionId !== sessionId) return;
    resolved = true; abortController = null;
    if (fullContent && chatSessionId === sessionId) {
      messages.push({role:"assistant", content:fullContent}); saveMsgs();
      contentDiv.innerHTML = renderMD(fullContent); hl();
      var act = document.createElement("div"); act.className = "msg-actions"; act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
      msgDiv.querySelector(".msg-body").appendChild(act);
    } else if (!fullContent) {
      if (!(e && e.name === "AbortError")) { showErr(e.message); msgDiv.remove(); }
    }
    streaming = false; dom.btnSend.disabled = false; dom.typing.style.display = "none";
  });
}

function showErr(msg) { var d = document.createElement("div"); d.className = "error"; d.textContent = "⚠ "+msg; dom.messages.appendChild(d); scrollBottom(); }
function saveMsgs() {
  if (currentModel && messages.length > 0) {
    messageCache[currentModel] = messages.slice();
  }
  try { var clone = messages.map(function(m){return {role:m.role, content:m.content}}); localStorage.setItem(msgsKey, JSON.stringify(clone)); } catch(e) { console.error("saveMsgs err:", e); }
}

// ===== EVENTS =====
dom.btnSend.addEventListener("click", function() { var t = dom.userInput.value.trim(); if (!t || streaming) return; dom.userInput.value = ""; dom.userInput.style.height = "auto"; sendMsg(t); });
dom.userInput.addEventListener("keydown", function(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); var t = dom.userInput.value.trim(); if (!t || streaming) return; dom.userInput.value = ""; dom.userInput.style.height = "auto"; sendMsg(t); } });
dom.userInput.addEventListener("input", function() { this.style.height = "auto"; this.style.height = Math.min(this.scrollHeight, 110) + "px"; });

// ===== PERSISTENCE =====
window.addEventListener("beforeunload", function() {
  if (messages.length > 0 && msgsKey) { try { var clone = messages.map(function(m){return {role:m.role, content:m.content}}); localStorage.setItem(msgsKey, JSON.stringify(clone)); } catch(e) {} }
});

// Save messages when tab becomes hidden (mobile app switch etc.)
document.addEventListener("visibilitychange", function() {
  if (document.hidden && messages.length > 0 && msgsKey) {
    try { var clone = messages.map(function(m){return {role:m.role, content:m.content}}); localStorage.setItem(msgsKey, JSON.stringify(clone)); } catch(e) {}
  }
});

// ===== INIT =====
applyAppearance();
</script>
</body>
</html>
