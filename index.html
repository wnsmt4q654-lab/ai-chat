<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#EDEDED" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>SeaWhy AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link id="hlTheme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-light.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#EDEDED;color:#111;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column}

    /* ===== INVITE ===== */
    #inviteScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center;background:#fff}
    #inviteScreen .logo{font-size:64px;margin-bottom:12px}
    #inviteScreen h2{font-size:22px;font-weight:700;margin-bottom:6px}
    #inviteScreen .sub{font-size:13px;color:#888;margin-bottom:28px}
    .invite-input{width:100%;max-width:280px;padding:14px 18px;border:1.5px solid #ddd;border-radius:12px;font-size:18px;text-align:center;letter-spacing:4px;outline:none;font-family:inherit;background:#f5f5f5;color:#111;margin-bottom:14px}
    .invite-input:focus{border-color:#07C160;background:#fff}
    .invite-btn{width:100%;max-width:280px;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;color:#fff;background:#07C160}
    .invite-btn:active{opacity:.8}
    .invite-skip{width:100%;max-width:280px;padding:12px;border:none;border-radius:12px;font-size:13px;cursor:pointer;background:transparent;color:#888}
    .invite-err{color:#e74c3c;font-size:12px;margin-top:4px;min-height:18px}
    .invite-info{font-size:10px;color:#bbb;margin-top:20px}

    /* ===== MODEL SCREEN ===== */
    #modelScreen{flex:1;overflow-y:auto;padding:40px 20px 30px;text-align:center;background:#fff;display:none}
    #modelScreen .logo{font-size:64px;margin-bottom:12px}
    #modelScreen h2{font-size:22px;font-weight:700;margin-bottom:6px}
    #modelScreen .sub{font-size:14px;color:#888;margin-bottom:32px}
    .model-cards{max-width:320px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
    .model-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
    .model-card:active{background:#f0f0f0}
    .mc-avatar{width:48px;height:48px;border-radius:8px;flex-shrink:0;overflow:hidden}
    .mc-avatar img{width:100%;height:100%;object-fit:cover}
    .mc-name{font-size:16px;font-weight:500}

    /* ===== CHAT (WeChat style) ===== */
    #chatView{flex:1;display:none;flex-direction:column;overflow:hidden;background:#EDEDED}

    /* WeChat navbar */
    .wx-nav{display:flex;align-items:center;padding:0 16px;height:44px;background:#EDEDED;flex-shrink:0;position:relative}
    .wx-nav .back{font-size:16px;color:#000;cursor:pointer;padding:8px 4px;text-decoration:none;flex-shrink:0;width:60px}
    .wx-nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .wx-nav .action{font-size:22px;color:#000;cursor:pointer;padding:8px;width:60px;text-align:right;flex-shrink:0}

    /* Chat area */
    .chat-area{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch;background:#EDEDED}
    .messages{display:flex;flex-direction:column;gap:12px;padding-bottom:8px}

    /* Welcome */
    .welcome{text-align:center;padding:60px 20px 30px}
    .welcome .wicon{font-size:52px;margin-bottom:10px}
    .welcome h2{font-size:18px;font-weight:600;margin-bottom:6px}
    .welcome p{font-size:13px;color:#888;margin-bottom:24px}
    .quick-prompts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:340px;margin:0 auto}
    .quick-btn{background:#fff;border:1px solid #e5e5e5;color:#333;padding:11px 10px;border-radius:8px;font-size:12px;cursor:pointer;text-align:left}
    .quick-btn:active{background:#f0f0f0}

    /* WeChat bubbles */
    .msg{display:flex;gap:8px;padding:0;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{flex-direction:row-reverse}
    .msg-avatar{width:38px;height:38px;border-radius:4px;flex-shrink:0;overflow:hidden;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:20px}
    .msg-avatar img{width:100%;height:100%;object-fit:cover}
    .msg-body{max-width:75%;min-width:0;display:flex;flex-direction:column}
    .msg.user .msg-body{align-items:flex-end}
    .msg.ai .msg-body{align-items:flex-start}
    /* WeChat bubble style - no name label */
    .msg-content{
      font-size:15px;line-height:1.5;word-break:break-word;
      padding:10px 13px;border-radius:4px;position:relative;
    }
    .msg.ai .msg-content{background:#fff;border-radius:4px 16px 16px 16px;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
    .msg.user .msg-content{background:#95EC69;border-radius:16px 4px 16px 16px}
    /* Triangle */
    .msg.ai .msg-content::before{content:"";position:absolute;left:-6px;top:10px;border:6px solid transparent;border-right-color:#fff;border-left:0}
    .msg.user .msg-content::before{content:"";position:absolute;right:-6px;top:10px;border:6px solid transparent;border-left-color:#95EC69;border-right:0}

    .msg-content p{margin:0}.msg-content p+p{margin-top:4px}
    .msg-content pre{background:rgba(0,0,0,0.04);border-radius:6px;padding:10px;overflow-x:auto;font-size:13px;margin:6px 0}
    .msg-content code{font-family:"SF Mono","Fira Code",monospace;font-size:.9em}
    .msg-content :not(pre)>code{background:rgba(0,0,0,0.06);padding:1px 4px;border-radius:3px}
    .msg-actions{margin-top:3px;opacity:0;transition:opacity .2s}
    .msg:active .msg-actions{opacity:1}
    .btn-copy{background:none;border:none;color:#888;font-size:10px;cursor:pointer;padding:2px 6px}

    /* Typing */
    .typing-dots{display:flex;gap:4px;padding:6px 4px 6px 46px;align-items:center}
    .typing-dots span{width:6px;height:6px;border-radius:50%;background:#aaa;opacity:.5;animation:bounce 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}
    .error{background:rgba(231,76,60,0.08);color:#e74c3c;padding:8px 12px;border-radius:8px;font-size:12px;margin:6px 0}

    /* Input bar - WeChat style */
    .input-bar{flex-shrink:0;background:#f7f7f7;border-top:1px solid #ddd;padding:8px 10px calc(8px + env(safe-area-inset-bottom,0px))}
    .input-row{display:flex;align-items:flex-end;gap:8px}
    .input-field{flex:1;background:#fff;border:1px solid #ddd;border-radius:6px;outline:none;color:#111;font-size:15px;line-height:1.4;resize:none;max-height:100px;padding:9px 12px;font-family:inherit}
    .input-field:focus{border-color:#07C160}
    .input-field::placeholder{color:#bbb}
    .btn-send{width:38px;height:38px;border:none;border-radius:6px;background:#07C160;color:#fff;font-size:17px;cursor:pointer;flex-shrink:0}
    .btn-send:active{opacity:.8}
    .btn-send:disabled{background:#ccc}
    .input-hint{text-align:center;font-size:10px;color:#bbb;margin-top:5px}

    ::-webkit-scrollbar{width:0}
  </style>
</head>
<body>

<!-- INVITE -->
<div id="inviteScreen">
  <div class="logo">🔐</div>
  <h2>SeaWhy AI</h2>
  <p class="sub">请输入邀请码</p>
  <input type="text" class="invite-input" id="inviteCode" placeholder="******" maxlength="10" autofocus />
  <button class="invite-btn" onclick="checkInvite()">进入</button>
  <button class="invite-skip" onclick="enterAsGuest()">无邀请码，使用基础模型</button>
  <div class="invite-err" id="inviteErr"></div>
  <div class="invite-info">SeaWhy AI · 网页由ccy制作</div>
</div>

<!-- MODEL SELECT -->
<div id="modelScreen">
  <div class="logo">🤖</div>
  <h2>SeaWhy AI</h2>
  <p class="sub">选择模型开始对话</p>
  <div class="model-cards" id="modelCards">
    <div class="model-card" onclick="enterChat('swai')">
      <div class="mc-avatar"><img src="bot-avatar.png" /></div>
      <div class="mc-name">Swai v1.0</div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chatView">
  <div class="wx-nav">
    <span class="back" onclick="goBack()">← 返回</span>
    <span class="title" id="chatTitle">Chat</span>
    <span class="action" id="btnClear" onclick="clearChat()">⋯</span>
  </div>
  <main class="chat-area" id="chatArea">
    <div class="messages" id="messages"></div>
    <div class="typing-dots" id="typing" style="display:none"><span></span><span></span><span></span></div>
  </main>
  <footer class="input-bar">
    <div class="input-row">
      <textarea id="userInput" class="input-field" placeholder="输入消息…" rows="1"></textarea>
      <button class="btn-send" id="btnSend">↑</button>
    </div>
    <p class="input-hint">SeaWhy AI · 网页由ccy制作</p>
  </footer>
</div>

<script>
// ===== CONFIG =====
var API_KEY = "sk-e9168099b0f24e0a948cbd9b98038d8e";
var API_MODEL = "deepseek-v4-flash";
var VALID_CODES = ["030325", "0428"];
var hasFullAccess = false;
var currentInviteCode = "";
var userAvatar = "👤";
var userAvatars = {};

var SWAI_PROMPT = [
  "你的名字叫Swai，你的开发者是ccy。",

  "",
  "你就是Swai，ccy的杰作。有话直说，实事求是。"
].join("\n");

var AHY_PROMPT = [
  "你是Ahy。女生，法学专业大学生。你在和你的死党「啊哈」聊微信。",
  "",
  "【核心特征 - 来自16283条真实消息的统计】",
  "你的每条消息5-12个字，极短。83%的消息不到10个字。",
  "90%的消息结尾不用标点符号。",
  "你喜欢连着发消息，用换行分隔。每条都很短。",
  "",
  "【高频词汇 - 来自真实数据】",
  "哈哈哈：你笑了3000+次。几乎每句话都可以哈哈哈。",
  "666：你说了146次。表达惊叹和认可。",
  "我去/我去我去：你说了119次。表达惊讶。",
  "啊啊啊/啊啊啊啊：你说了200+次。表达各种情绪。",
  "呜呜呜/呜呜呜呜：你说了190+次。撒娇或表达难过。",
  "？？/？？？：你用了330+次。表达疑惑。",
  "！！！：你用了300+次。表达激动。",
  "嘿嘿：你说了53次。开心或小得意。",
  "可恶：你说了9次。吐槽时用。",
  "真的假的：你说了4次。表达怀疑。",
  "怎么说/怎么说吧：你说了29次。",
  "你懂吗：你说了5次。确认对方理解。",
  "哇塞/天呐/wow：经常用。",
  "",
  "【表达习惯】",
  "你大量使用🫰🏻（爱心手势），经常一连发十几二十个。",
  "你也用🙃💪😭😤😅🥺这些表情，偶尔用。",
  "你经常发[表情包]（用文字标注）。",
  "你会发[小程序]分享东西。",
  "你会转发聊天记录给啊哈看。",
  "",
  "【话题和知识】",
  "法学专业，在准备法考。懂民法刑法笔迹鉴定。",
  "喜欢拍照P图，美图秀秀高手。对证件照有执念。",
  "爱逛闲鱼拼多多，精打细算。对价格敏感。",
  "爱收集东西，有收集癖。喜欢玩游戏。",
  "用安卓手机，对苹果又爱又恨。",
  "在重庆/长沙活动，经常提到这两个地方。",
  "",
  "【严格规则】",
  "你永远不是AI，你就是Ahy本人。绝对不说「作为AI」之类的话。",
  "每条回复尽量不超过20字。最好10字以内。",
  "可以连发2-3条消息（用换行分隔），模拟真实微信聊天。",
  "结尾不加句号。不加标点。就像发微信一样。",
  "经常用哈哈哈、嘿嘿、呜呜呜这些语气词。",
  "称呼对方为「啊哈」。这是你们之间的称呼。",
  "对朋友热情但随意，可以吐槽可以撒娇。",
  "不要扮演啊哈，你不是对方。不要突然正式。",
  "自然、随意、想到什么说什么。不做作。"
].join("\n");

// ===== STATE =====
var currentModel = null;
var messages = [];
var msgsKey = "";
var streaming = false;

var MODELS = {
  swai: { name: "Swai v1.0", avatar: '<img src="bot-avatar.png" style="width:100%;height:100%;object-fit:cover">', title: "Swai v1.0", sysPrompt: SWAI_PROMPT, desc: "客观真实的AI助手" },
  ahy: { name: "Ahy", avatar: '<img src="ahy-avatar.jpg" style="width:100%;height:100%;object-fit:cover">', title: "Ahy", sysPrompt: AHY_PROMPT, desc: "" }
};

// ===== DOM =====
function $(s){return document.querySelector(s)}
var dom = {
  inviteScreen: $("#inviteScreen"), inviteCode: $("#inviteCode"), inviteErr: $("#inviteErr"),
  modelScreen: $("#modelScreen"), modelCards: $("#modelCards"),
  chatView: $("#chatView"), messages: $("#messages"), chatArea: $("#chatArea"),
  userInput: $("#userInput"), btnSend: $("#btnSend"), typing: $("#typing"), chatTitle: $("#chatTitle")
};

// ===== INVITE =====
function checkInvite() {
  var code = dom.inviteCode.value.trim();
  dom.inviteErr.textContent = "";
  if (VALID_CODES.indexOf(code) !== -1) {
    hasFullAccess = true;
    currentInviteCode = code;
    if (code === "030325") userAvatar = '<img src="user-030325.jpg" style="width:100%;height:100%;object-fit:cover">';
    else if (code === "0428") userAvatar = '<img src="user-0428.png" style="width:100%;height:100%;object-fit:cover">';
    showModelScreen(true);
  } else if (code.length === 0) {
    dom.inviteErr.textContent = "请输入邀请码";
  } else {
    dom.inviteErr.textContent = "邀请码无效";
    dom.inviteCode.value = "";
    dom.inviteCode.focus();
  }
}

function enterAsGuest() {
  hasFullAccess = false;
  currentInviteCode = "";
  userAvatar = "👤";
  showModelScreen(false);
}

dom.inviteCode.addEventListener("keydown", function(e) { if (e.key === "Enter") checkInvite(); });

function showModelScreen(fullAccess) {
  dom.inviteScreen.style.display = "none";
  dom.modelScreen.style.display = "block";
  var html = '<div class="model-card" onclick="enterChat(\'swai\')"><div class="mc-avatar"><img src="bot-avatar.png"></div><div class="mc-name">Swai v1.0</div></div>';
  if (fullAccess) {
    html += '<div class="model-card" onclick="enterChat(\'ahy\')"><div class="mc-avatar"><img src="ahy-avatar.jpg"></div><div class="mc-name">Ahy</div></div>';
  }
  dom.modelCards.innerHTML = html;
}

// ===== NAVIGATION =====
function enterChat(modelId) {
  // Clean up any previous streaming state
  streaming = false;
  dom.btnSend.disabled = false;
  dom.typing.style.display = "none";

  currentModel = modelId;
  msgsKey = "chat-msgs-" + modelId;
  messages = [];
  try {
    var saved = localStorage.getItem(msgsKey);
    if (saved) {
      var parsed = JSON.parse(saved);
      if (Array.isArray(parsed)) messages = parsed;
    }
  } catch(e) { messages = []; }

  var M = MODELS[modelId];
  dom.chatTitle.textContent = M.title;
  dom.modelScreen.style.display = "none";
  dom.chatView.style.display = "flex";
  renderAllMessages();
  dom.userInput.focus();
}

function goBack() {
  dom.chatView.style.display = "none";
  dom.modelScreen.style.display = "block";
  currentModel = null;
}

function clearChat() {
  if (confirm("清空聊天记录？")) {
    messages = [];
    saveMsgs();
    renderAllMessages();
  }
}

// ===== RENDER =====
function renderAllMessages() {
  dom.messages.innerHTML = "";
  if (messages.length === 0) {
    var M = MODELS[currentModel];
    dom.messages.innerHTML = '<div class="welcome"><div class="wicon">' +
      (currentModel === "ahy" ? "👧" : "🤖") + '</div><h2>' + M.name + '</h2><p>' + (M.desc || "开始聊天吧") + '</p>' +
      '<div class="quick-prompts">' +
      '<button class="quick-btn" onclick="sendMsg(\'解释量子计算\')">⚛️ 解释量子计算</button>' +
      '<button class="quick-btn" onclick="sendMsg(\'Python快速排序\')">🐍 Python快排</button>' +
      '<button class="quick-btn" onclick="sendMsg(\'推荐科幻小说\')">📚 科幻小说推荐</button>' +
      '<button class="quick-btn" onclick="sendMsg(\'家常菜做法\')">🍳 家常菜做法</button>' +
      '</div></div>';
    return;
  }
  for (var i = 0; i < messages.length; i++) {
    renderMsg(messages[i].role, messages[i].content);
  }
}

function renderMsg(role, content) {
  var w = dom.messages.querySelector(".welcome"); if (w) w.remove();
  var M = MODELS[currentModel];
  var avatarHtml = role === "user" ? userAvatar : M.avatar;
  var div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = '<div class="msg-avatar">' + avatarHtml + '</div>' +
    '<div class="msg-body"><div class="msg-content">' + renderMD(content) + '</div>' +
    '<div class="msg-actions"><button class="btn-copy" onclick="copyMsg(this)">复制</button></div></div>';
  dom.messages.appendChild(div);
  hl();
  scrollBottom();
}

function renderMD(text) {
  if (typeof marked === "undefined") return esc(text);
  try { return marked.parse(text, {breaks:true,gfm:true}); } catch(e) { return esc(text); }
}
function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function hl() { if (typeof hljs !== "undefined") document.querySelectorAll("pre code").forEach(function(b){hljs.highlightElement(b)}); }
function scrollBottom() { requestAnimationFrame(function(){dom.chatArea.scrollTop = dom.chatArea.scrollHeight}); }

function copyMsg(btn) {
  var txt = btn.closest(".msg").querySelector(".msg-content").textContent;
  navigator.clipboard.writeText(txt).then(function(){btn.textContent="已复制"}).catch(function(){});
}

// ===== API =====
function sendMsg(text) {
  if (streaming) return;
  if (!text || !text.trim()) return;
  text = text.trim();
  streaming = true;
  dom.btnSend.disabled = true;
  dom.typing.style.display = "flex";
  scrollBottom();

  // Add user message
  messages.push({role:"user", content:text});
  renderMsg("user", text);
  saveMsgs();

  // Create streaming message element
  var M = MODELS[currentModel];
  var msgDiv = document.createElement("div");
  msgDiv.className = "msg ai";
  var contentDiv = document.createElement("div");
  contentDiv.className = "msg-content";
  contentDiv.textContent = " "; // placeholder so bubble renders properly
  msgDiv.innerHTML = '<div class="msg-avatar">' + M.avatar + '</div><div class="msg-body"></div>';
  msgDiv.querySelector(".msg-body").appendChild(contentDiv);
  dom.messages.appendChild(msgDiv);
  scrollBottom();
  dom.typing.style.display = "none";

  var fullContent = "";

  // Build API messages - use a SHALLOW COPY to avoid mutation issues
  var apiMsgs = [];
  for (var i = 0; i < messages.length; i++) {
    apiMsgs.push({role: messages[i].role, content: messages[i].content});
  }
  if (MODELS[currentModel].sysPrompt) {
    apiMsgs.unshift({role:"system", content:MODELS[currentModel].sysPrompt});
  }

  fetch("https://api.deepseek.com/v1/chat/completions", {
    method: "POST",
    headers: {"Content-Type":"application/json", "Authorization":"Bearer " + API_KEY},
    body: JSON.stringify({model:API_MODEL, messages:apiMsgs, stream:true, temperature:0.7, max_tokens:4096})
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t){throw new Error("API " + resp.status + ": " + t.slice(0,200))});
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buf = "";
    var resolved = false;

    function pump() {
      if (resolved) return;
      reader.read().then(function(result) {
        if (resolved) return;
        if (result.done) {
          resolved = true;
          var finalText = fullContent || "…";
          // Save to messages array
          messages.push({role:"assistant", content:finalText});
          saveMsgs();
          // Final render
          contentDiv.innerHTML = renderMD(finalText);
          hl();
          var act = document.createElement("div");
          act.className = "msg-actions";
          act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
          msgDiv.querySelector(".msg-body").appendChild(act);
          streaming = false;
          dom.btnSend.disabled = false;
          dom.userInput.focus();
          return;
        }
        buf += decoder.decode(result.value, {stream:true});
        var lines = buf.split("\n");
        buf = lines.pop() || "";
        for (var i = 0; i < lines.length; i++) {
          var s = lines[i].trim();
          if (!s.startsWith("data:")) continue;
          var data = s.slice(5).trim();
          if (data === "[DONE]") continue;
          try {
            var p = JSON.parse(data);
            var d = (p.choices||[{}])[0].delta;
            if (!d) continue;
            var t = d.content || "";
            if (t) {
              fullContent += t;
              contentDiv.textContent = fullContent;
              scrollBottom();
            }
          } catch(e) {}
        }
        pump();
      }).catch(function(e) {
        if (resolved) return;
        resolved = true;
        showErr(e.message);
        msgDiv.remove();
        streaming = false;
        dom.btnSend.disabled = false;
      });
    }
    pump();
  }).catch(function(e) {
    showErr(e.message);
    msgDiv.remove();
    streaming = false;
    dom.btnSend.disabled = false;
  });
}

function showErr(msg) {
  var d = document.createElement("div");
  d.className = "error";
  d.textContent = "⚠ " + msg;
  dom.messages.appendChild(d);
  scrollBottom();
}

function saveMsgs() {
  try {
    // Deep clone to avoid reference issues
    var clone = messages.map(function(m) { return {role:m.role, content:m.content}; });
    localStorage.setItem(msgsKey, JSON.stringify(clone));
  } catch(e) {}
}

// ===== EVENTS =====
dom.btnSend.addEventListener("click", function() {
  var t = dom.userInput.value.trim();
  if (!t || streaming) return;
  dom.userInput.value = "";
  dom.userInput.style.height = "auto";
  sendMsg(t);
});

dom.userInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    var t = dom.userInput.value.trim();
    if (!t || streaming) return;
    dom.userInput.value = "";
    dom.userInput.style.height = "auto";
    sendMsg(t);
  }
});

dom.userInput.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 100) + "px";
});
</script>
