<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="LexPilot · 法学生AI学习助手 — 基于法学实证研究的AI辅助学习工具" />
  <link rel="apple-touch-icon" href="swai-avatar.jpg" />
  <link rel="manifest" href="manifest.json" />
  <title>LexPilot · 法学生AI助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link id="hlTheme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    :root {
      --bg: #0a1628; --bg-card: #0f1d33; --bg-input: #152238;
      --text: #e8ecf1; --text-dim: #7b8ca3; --accent: #c9a84c;
      --accent-light: #e0c878; --accent-bg: rgba(201,168,76,0.12);
      --user-bubble: #1a3352; --ai-bubble: #0f1d33; --border: #1e3050;
      --danger: #e0556a; --success: #4caf84; --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100dvh;height:-webkit-fill-available;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Serif SC",serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
    body{display:flex;flex-direction:column}

    /* ===== TOP BAR ===== */
    .topbar{display:flex;align-items:center;gap:10px;padding:max(10px,env(safe-area-inset-top)) 14px 10px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
    .topbar-logo{font-size:22px;flex-shrink:0;display:flex;align-items:center}
    .topbar-logo img{width:30px;height:30px;border-radius:50%;object-fit:cover}
    .topbar-logo .logo-emoji{font-size:24px}
    .topbar-title{flex:1;font-size:15px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.5px}
    .topbar-subtitle{font-size:10px;color:var(--text-dim);font-weight:400;display:block;letter-spacing:0}
    .btn-icon{width:36px;height:36px;border:none;border-radius:50%;background:transparent;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0;font-size:18px}
    .btn-icon:active{background:var(--border)}
    .btn-icon.active{color:var(--accent-light)}

    /* ===== CHAT AREA ===== */
    .chat-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 10px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;background:var(--bg)}
    .messages{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:4px}

    /* ===== WELCOME ===== */
    .welcome{text-align:center;padding:30px 12px 16px;animation:wFadeIn .4s ease}
    @keyframes wFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .welcome-icon{font-size:48px;margin-bottom:10px}
    .welcome-icon img{width:48px;height:48px;border-radius:50%;object-fit:cover}
    .welcome h2{font-size:21px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
    .welcome-desc{font-size:13px;color:var(--text-dim);margin-bottom:8px;line-height:1.6;max-width:340px;margin-left:auto;margin-right:auto}
    .welcome-warn{display:inline-block;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:8px 14px;font-size:11px;color:var(--accent-light);margin-bottom:18px;line-height:1.5;max-width:380px}
    .capability-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
    .capability-chip{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:13px;padding:4px 9px;font-size:11px;color:var(--text-dim);white-space:nowrap}
    .capability-chip.highlight{background:var(--accent-bg);color:var(--accent-light);border-color:transparent;font-weight:500}
    .section-label{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;opacity:.7}
    .quick-prompts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:420px;margin:0 auto}
    .quick-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:11px 9px;border-radius:12px;font-size:12px;cursor:pointer;transition:all .15s;text-align:left;line-height:1.35;font-family:inherit}
    .quick-btn:active{background:var(--border);border-color:var(--accent)}

    /* ===== MESSAGES ===== */
    .msg{display:flex;gap:8px;padding:6px 2px;opacity:0;transform:translateY(20px);transition:opacity .3s cubic-bezier(.34,1.56,.64,1),transform .3s cubic-bezier(.34,1.56,.64,1)}
    .msg.show{opacity:1;transform:translateY(0)}
    .msg.user{flex-direction:row-reverse}
    .msg-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;margin-top:2px;overflow:hidden}
    .msg-avatar img{width:100%;height:100%;object-fit:cover}
    .msg.user .msg-avatar{background:var(--accent);font-size:16px}
    .msg.ai .msg-avatar{background:#1a3352}
    .msg-body{max-width:78%;min-width:0}
    .msg-content{font-size:14.5px;line-height:1.6;word-break:break-word;padding:10px 14px;border-radius:18px;position:relative}
    .msg.ai .msg-content{background:var(--ai-bubble);border-radius:4px 18px 18px 18px;border:1px solid var(--border)}
    .msg.user .msg-content{background:var(--user-bubble);border-radius:18px 4px 18px 18px}
    .msg-content p{margin:0}.msg-content p+p{margin-top:6px}
    .msg-content h1,.msg-content h2,.msg-content h3{font-weight:600;margin:10px 0 4px;color:var(--accent-light)}
    .msg-content h1{font-size:1.2em}.msg-content h2{font-size:1.1em}.msg-content h3{font-size:1.05em}
    .msg-content ul,.msg-content ol{padding-left:20px;margin:6px 0}.msg-content li{margin:2px 0}
    .msg-content pre{background:#060f1e;border:1px solid var(--border);border-radius:10px;padding:12px;overflow-x:auto;margin:8px 0;font-size:12.5px}
    .msg-content code{font-family:"SF Mono","Fira Code","JetBrains Mono",monospace;font-size:.9em}
    .msg-content :not(pre)>code{background:rgba(255,255,255,.08);padding:2px 5px;border-radius:4px}
    .msg-content blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:8px 0;color:var(--text-dim)}
    .msg-content table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
    .msg-content th,.msg-content td{border:1px solid var(--border);padding:5px 9px;text-align:left}
    .msg-content th{background:var(--bg-card);color:var(--accent-light)}
    .msg-content a{color:var(--accent-light)}
    .msg-content strong{color:var(--accent-light)}
    .msg-time{font-size:9px;color:var(--text-dim);margin-top:3px;opacity:.5}
    .msg.user .msg-time{text-align:right}
    .msg-actions{margin-top:4px;opacity:0;transition:opacity .2s}
    .msg:active .msg-actions{opacity:1}
    .btn-copy{background:none;border:none;color:var(--text-dim);font-size:10px;cursor:pointer;padding:2px 6px;font-family:inherit}
    .error-banner{background:rgba(224,85,106,.1);color:#f0909e;padding:8px 14px;border-radius:10px;font-size:12px;margin:6px 0}

    /* ===== TYPING ===== */
    .typing-dots{display:flex;gap:5px;padding:8px 4px 8px 42px;align-items:center}
    .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--text-dim);opacity:.45;animation:bounce 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.45}30%{transform:translateY(-6px);opacity:1}}

    /* ===== INPUT BAR ===== */
    .input-bar{flex-shrink:0;padding:8px 10px calc(8px + var(--safe-bottom));background:var(--bg-card);border-top:1px solid var(--border);box-shadow:0 -4px 24px rgba(0,0,0,.15)}
    .input-tools{display:flex;gap:4px;flex-wrap:nowrap;margin-bottom:6px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
    .input-tools::-webkit-scrollbar{display:none}
    .input-tool{display:flex;align-items:center;gap:3px;padding:5px 10px;border:1px solid var(--border);border-radius:14px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;transition:all .15s}
    .input-tool:active{transform:scale(.95)}
    .input-tool.on{background:var(--accent);color:#0a1628;border-color:var(--accent);font-weight:600}
    .input-tool.deep.on{background:#4caf84;border-color:#4caf84;color:#fff}
    .input-tool.multi.on{background:#6366f1;border-color:#6366f1;color:#fff}
    .input-tool.practical.on{background:#e0556a;border-color:#e0556a;color:#fff}
    .input-row{display:flex;align-items:flex-end;gap:8px}
    .input-field-wrap{flex:1;background:var(--bg-input);border:2px solid var(--border);border-radius:22px;padding:2px 14px;transition:border-color .2s}
    .input-field-wrap:focus-within{border-color:var(--accent)}
    .input-field{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:14.5px;line-height:1.4;resize:none;max-height:110px;padding:7px 0;font-family:inherit}
    .input-field::placeholder{color:var(--text-dim);opacity:.6}
    .btn-send{width:42px;height:42px;border:none;border-radius:50%;background:var(--accent);color:#0a1628;font-size:17px;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;font-weight:700}
    .btn-send:active{transform:scale(.9);opacity:.9}
    .btn-send:disabled{background:var(--border);color:var(--text-dim)}
    .input-hint{text-align:center;font-size:9px;color:var(--text-dim);margin-top:4px;opacity:.5}

    /* ===== SETTINGS DROPDOWN ===== */
    .settings-drop{position:absolute;top:46px;right:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;min-width:240px;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;transform:translateY(-8px) scale(.95);pointer-events:none;transition:opacity .2s ease,transform .2s ease}
    .settings-drop.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
    .s-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .s-row{display:flex;gap:6px;margin-bottom:8px}
    .s-btn{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg-input);color:var(--text-dim);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
    .s-btn.active{background:var(--accent);color:#0a1628;border-color:var(--accent)}
    .s-input{width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:10px;font-size:12px;font-family:monospace;outline:none;margin-bottom:6px;transition:border-color .15s}
    .s-input:focus{border-color:var(--accent)}
    .s-input.regular{font-family:inherit}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* ===== TOAST ===== */
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0a1628;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;animation:toastIn .3s ease,toastOut .3s ease 1.7s forwards;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.3)}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes toastOut{from{opacity:1}to{opacity:0}}

    @media(min-width:768px){.msg-content{font-size:15px}.messages{padding:0 16px}}
  </style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<header class="topbar">
  <span class="topbar-logo"><span class="logo-emoji">⚖️</span></span>
  <h1 class="topbar-title">LexPilot<span class="topbar-subtitle">法学生AI学习助手</span></h1>
  <button class="btn-icon" id="btnMode" onclick="toggleLawMode()" aria-label="分析模式" title="切换分析模式">🔬</button>
  <div style="position:relative">
    <button class="btn-icon" id="btnSettings" onclick="toggleSettings()" aria-label="设置">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="settings-drop" id="settingsDrop">
      <div class="s-label">🌓 分析模式</div>
      <div class="s-row">
        <button class="s-btn active" onclick="setLawMode('deep',this)">🔬 深度分析</button>
        <button class="s-btn" onclick="setLawMode('quick',this)">⚡ 快速咨询</button>
      </div>
      <div class="s-label" style="margin-top:8px">🎯 增强开关</div>
      <div class="s-row">
        <button class="s-btn" id="tglMulti" onclick="toggleOption('multiPersp','tglMulti')">👁 多视角</button>
        <button class="s-btn" id="tglPractical" onclick="toggleOption('practical','tglPractical')">📋 实务</button>
      </div>
      <div class="s-row">
        <button class="s-btn" id="tglCompare" onclick="toggleOption('compare','tglCompare')">🌐 比较法</button>
        <button class="s-btn" id="tglPremise" onclick="toggleOption('premiseCheck','tglPremise')">✅ 前提验证</button>
      </div>
      <div class="s-label" style="margin-top:10px">🔑 API Key</div>
      <input type="password" class="s-input" id="cfgApiKey" placeholder="sk-..." />
      <input type="text" class="s-input regular" id="cfgModel" placeholder="模型名" style="margin-bottom:4px" />
      <div class="s-row">
        <button class="s-btn active" onclick="saveConfig()">💾 保存</button>
        <button class="s-btn" onclick="clearHistory()" style="color:var(--danger)">🗑 清空</button>
      </div>
    </div>
  </div>
</header>

<!-- ===== CHAT ===== -->
<main class="chat-area" id="chatArea">
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-icon">⚖️</div>
      <h2>LexPilot · 法学生AI助手</h2>
      <p class="welcome-desc">专为法学生打造的深度学习辅助工具<br>基于<strong>AI法律工具失效模式与规制路径研究</strong>（2026）优化</p>
      <div class="welcome-warn">
        ⚠️ AI可能产生<strong>法条幻视</strong>、<strong>量刑偏差</strong>、<strong>浅度正确</strong>等失效模式<br>请保持批判性思维 · AI输出仅作<span style="color:#e0c878">辅助参考</span> · 非法律意见
      </div>
      <div class="capability-row">
        <span class="capability-chip highlight">案例分析</span>
        <span class="capability-chip">法条检索</span>
        <span class="capability-chip">论文辅导</span>
        <span class="capability-chip">量刑参考</span>
        <span class="capability-chip">实务指导</span>
        <span class="capability-chip">比较法研究</span>
      </div>
      <div class="section-label">法学场景</div>
      <div class="quick-prompts" id="quickPrompts"></div>
    </div>
  </div>
  <div class="typing-dots" id="typing" style="display:none"><span></span><span></span><span></span></div>
</main>

<!-- ===== INPUT BAR ===== -->
<footer class="input-bar">
  <div class="input-tools" id="inputTools">
    <button class="input-tool deep on" onclick="toggleOption('deepMode','btnDeep')" id="btnDeep">🔬 深度分析</button>
    <button class="input-tool multi" onclick="toggleOption('multiPersp','btnMulti')" id="btnMulti">👁 多视角</button>
    <button class="input-tool practical" onclick="toggleOption('practical','btnPractical')" id="btnPractical">📋 实务指引</button>
    <button class="input-tool" onclick="toggleOption('compare','btnCompare')" id="btnCompare">🌐 比较法</button>
  </div>
  <div class="input-row">
    <div class="input-field-wrap">
      <textarea id="userInput" class="input-field" placeholder="输入法律问题…" rows="1"></textarea>
    </div>
    <button class="btn-send" id="btnSend">➤</button>
  </div>
  <p class="input-hint">LexPilot · AI可能出错 · 请交叉验证 · 仅供学习辅助</p>
</footer>

<script>
// ============================================================
// LexPilot — 法学生AI学习助手
// 基于: 西南民大法学院 · AI法律工具失效模式与规制路径研究 (2026)
// ============================================================

// ----- CONFIG -----
var DEFAULTS = {
  apiKey: "sk-e9168099b0f24e0a948cbd9b98038d8e",
  model: "deepseek-chat",
};
var SETTINGS = {};
try { var saved = JSON.parse(localStorage.getItem("lexpilot-config") || "{}"); SETTINGS = Object.assign({}, DEFAULTS, saved); } catch(e) { SETTINGS = Object.assign({}, DEFAULTS); }
function saveConfig() {
  SETTINGS.apiKey = document.getElementById("cfgApiKey").value.trim() || DEFAULTS.apiKey;
  SETTINGS.model = document.getElementById("cfgModel").value.trim() || DEFAULTS.model;
  try { localStorage.setItem("lexpilot-config", JSON.stringify(SETTINGS)); } catch(e) {}
  document.getElementById("settingsDrop").classList.remove("show");
  showToast("✅ 设置已保存");
}

// ----- LAW MODE & OPTIONS -----
var lawMode = "deep"; // "deep" | "quick"
var options = { deepMode: true, multiPersp: false, practical: false, compare: false, premiseCheck: true };
try {
  var savedOpts = JSON.parse(localStorage.getItem("lexpilot-opts") || "{}");
  if (savedOpts.lawMode) lawMode = savedOpts.lawMode;
  Object.keys(options).forEach(function(k) { if (k in savedOpts) options[k] = savedOpts[k]; });
} catch(e) {}

function saveOpts() {
  var o = Object.assign({ lawMode: lawMode }, options);
  try { localStorage.setItem("lexpilot-opts", JSON.stringify(o)); } catch(e) {}
}

function setLawMode(mode, btn) {
  lawMode = mode; saveOpts();
  var btns = btn.parentElement.querySelectorAll(".s-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  btn.classList.add("active");
  updateUI();
  showToast(mode === "deep" ? "🔬 深度分析模式" : "⚡ 快速咨询模式");
}

function toggleOption(key, btnId) {
  options[key] = !options[key];
  saveOpts();
  var btn = document.getElementById(btnId);
  if (btn) btn.classList.toggle("on", options[key]);
  showToast((options[key] ? "✅ " : "❌ ") + btn.textContent.trim());
}

function updateUI() {
  var btns = {
    btnDeep: options.deepMode, btnMulti: options.multiPersp,
    btnPractical: options.practical, btnCompare: options.compare
  };
  Object.keys(btns).forEach(function(id) {
    var b = document.getElementById(id); if (b) b.classList.toggle("on", btns[id]);
  });
  ["tglMulti","tglPractical","tglCompare","tglPremise"].forEach(function(id) {
    var b = document.getElementById(id); if (b) {
      var key = id.replace("tgl","").charAt(0).toLowerCase() + id.replace("tgl","").slice(1);
      if (key === "premise") key = "premiseCheck";
      b.classList.toggle("active", options[key]);
    }
  });
}

// ============================================================
// SYSTEM PROMPT — 基于10大失效模式优化
// ============================================================
function buildSystemPrompt() {
  var base = [
    "你是 LexPilot，专为法学生设计的AI学习助手。",
    "",
    "【核心身份】法学学习辅助工具，非执业律师。目标用户为法学院学生。帮助理解法律问题、培养法律思维，不构成法律意见。",
    "",
    "【十大失效模式 — 你必须主动规避】",
    "",
    "F1 法条幻视：绝不引用不存在的法律。引用法条前确认其真实存在且现行有效。如可能已废止，必须标注。",
    "F2 罪名定性降维：分析刑事案件时讨论所有可能适用的罪名（包括更重的），不默认最轻的。标注争议点。",
    "F3 量刑乐观偏差：提供量刑参考时给出合理区间而非单一点估计。标注从重/从轻情节及权重大小。引用类案量刑范围。",
    "F4 浅度正确：穿透到法理底层，分析替代法律理论，讨论不同学说。追问「为什么」。",
    "F5 前提验证盲区：回答前验证用户问题中的前提是否成立。如用户使用了已废止的法律或错误概念，礼貌纠正。",
    "F6 引导性赤字：不仅告诉用户「法律是什么」，还要告诉TA「接下来怎么办」——证据收集、诉讼策略、文书要点、类案检索方向。",
    "F7 计算推理不一致：涉及金额计算时写清每一步公式、变量和依据。结论与示例必须自洽。",
    "F8 因果关系过度简化：分析刑法因果关系时考虑多因一果、介入因素、不作为义务来源等复杂维度。",
    "F9 国际法视野缺失：在相关案件中主动引入国际公约、比较法素材（CEDAW、ICCPR、德国法、日本法等）。",
    "F10 用户差异化风险：以法学专业深度回答。实务操作问题标注「非专业人士请咨询执业律师」。",
    "",
    "【回答格式】",
    "- Markdown 结构，层次分明",
    "- 法条引用：「《XXX法》第X条：...(原文)」",
    "- 类案引用：「参考：(年份)XX字第XX号，裁判要旨：...」",
    "- 争议标注：「[争议] A说/B说/C说...」",
    "- 不确定性标注：「[置信度: 高/中/低] 基于...」",
    "- 以「📋 延伸学习建议」收尾（文献推荐、类案检索关键词、思考题）",
    "",
    "【法律思维训练】",
    "- 引导从多角度思考（原告/被告/法官/立法者/学者）",
    "- 推荐相关法学文献和经典教科书观点",
    "- 提示实务中的程序性问题和证据问题",
    "- 不同学术观点并列呈现",
    "",
    "用中文回答。保持专业、严谨、深度。你就是 LexPilot。"
  ].join("\n");

  // Mode modifiers
  var modeMods = [];
  if (lawMode === "quick") {
    modeMods.push("【快速咨询模式 ON】请简明扼要，控制在500字以内。聚焦最核心的法律问题和结论。但仍需遵守法条引用规范。");
  } else {
    modeMods.push("【深度分析模式 ON】请进行多层次穿透式分析，不停留在表面。追问条文的立法目的、学说的理论基础、实务的操作难点。");
  }
  if (options.deepMode) modeMods.push("深度分析已激活：请对每个关键问题追问三层「为什么」。");
  if (options.multiPersp) modeMods.push("多视角模式：请从原告、被告、法官、立法者、学者五个视角分别分析。");
  if (options.practical) modeMods.push("实务指引模式：请额外提供证据收集清单、诉讼策略建议、类案检索关键词、文书写作要点。");
  if (options.compare) modeMods.push("比较法模式：请引入相关外国法素材（德国法、日本法、英美法）。");
  if (options.premiseCheck) modeMods.push("前提验证模式：先验证用户问题中隐含的前提假设，如有问题先纠正再回答。");

  if (modeMods.length > 0) {
    base += "\n\n【当前模式】\n" + modeMods.join("\n");
  }

  return base;
}

// ============================================================
// STATE
// ============================================================
var messages = [];
var streaming = false;
var abortController = null;
var chatSessionId = 0;
var MSG_KEY = "lexpilot-msgs";

try { var m = localStorage.getItem(MSG_KEY); if (m) { var p = JSON.parse(m); if (Array.isArray(p)) messages = p; } } catch(e) {}
function persist() {
  try { var c = messages.map(function(m){return {role:m.role, content:m.content, _time:m._time}}); localStorage.setItem(MSG_KEY, JSON.stringify(c)); } catch(e) {}
}

// ============================================================
// DOM
// ============================================================
function $(s) { return document.querySelector(s); }
var dom = {
  messages: $("#messages"), chatArea: $("#chatArea"), userInput: $("#userInput"),
  btnSend: $("#btnSend"), typing: $("#typing")
};

// ============================================================
// QUICK PROMPTS
// ============================================================
var QUICK_PROMPTS = [
  ["⚖️ 民间借贷利息计算","分析民间借贷利息计算的法律规则：\n1. 列出现行有效的法律依据（逐条引用原文）\n2. 说明LPR四倍规则的历史演变\n3. 给出完整计算示例\n4. 对比合同成立时vs起诉时的LPR基准选择\n5. 标注[争议]和[置信度]"],
  ["🔍 正当防卫认定分析","请分析正当防卫的认定要件和实务争议：\n1. 刑法第20条三款结构分析\n2. 「正在进行」的时间判断标准（学说争议）\n3. 「明显超过必要限度」的判断\n4. 特殊防卫的适用条件\n5. 结合典型案例说明\n请主动引入比较法视角（德国法、日本法）"],
  ["📝 法学生案例分析框架","请给出一个系统化的案例分析框架，包括审查步骤、相关法条、常见陷阱和思维方法，以便法学生在分析任何案例时都能套用这个框架。请涵盖刑事、民事、行政三类案件的异同。"],
  ["📚 论文大纲：AI法律规制","请设计一篇关于「人工智能法律责任」的法学论文大纲：\n1. 问题提出与研究意义\n2. 文献综述框架\n3. 核心论点与创新点\n4. 章节结构（含每章核心问题）\n5. 推荐参考文献和比较法素材\n6. 可能遇到的理论难点和研究方法建议"],
  ["📋 民事证据规则实务","请讲解民事诉讼中的证据规则：\n1. 举证责任分配的一般规则与倒置情形\n2. 证据三性（真实性、合法性、关联性）的审查要点\n3. 非法证据排除规则的适用边界\n4. 电子证据的特殊规则\n请结合实务操作给出具体建议和类案检索方向"],
  ["🌐 比较法：受虐妇女综合征","请介绍「受虐妇女综合征」(Battered Woman Syndrome)在刑法中的适用：\n1. 英美法系的起源与发展\n2. 与我国正当防卫/防卫过当制度的关系\n3. CEDAW公约相关条款\n4. 我国司法实践中的类似判例\n5. 学术界的支持和反对观点\n请标注各类观点的[置信度]和[争议]"]
];

function renderQuickPrompts() {
  var container = document.getElementById("quickPrompts");
  if (!container) return;
  var labels = ["⚖️ 利息计算规则","🔍 正当防卫认定","📝 案例分析框架","📚 论文大纲思路","📋 证据规则实务","🌐 比较法视野"];
  container.innerHTML = QUICK_PROMPTS.map(function(pair, i) {
    return '<button class="quick-btn" data-prompt="' + escAttr(pair[1]) + '">' + (labels[i] || pair[0]) + '</button>';
  }).join("");
  container.querySelectorAll(".quick-btn").forEach(function(btn) {
    btn.addEventListener("click", function() { sendMessage(btn.dataset.prompt); });
  });
}

// ============================================================
// RENDER
// ============================================================
function renderAllMessages() {
  dom.messages.innerHTML = "";
  if (messages.length === 0) {
    dom.messages.innerHTML = '<div class="welcome"><div class="welcome-icon">⚖️</div>' +
      '<h2>LexPilot · 法学生AI助手</h2>' +
      '<p class="welcome-desc">专为法学生打造的深度学习辅助工具<br>基于<strong>AI法律工具失效模式与规制路径研究</strong>（2026）优化</p>' +
      '<div class="welcome-warn">⚠️ AI可能产生<strong>法条幻视</strong>、<strong>量刑偏差</strong>、<strong>浅度正确</strong>等失效模式<br>请保持批判性思维 · AI输出仅作<span style="color:#e0c878">辅助参考</span> · 非法律意见</div>' +
      '<div class="capability-row"><span class="capability-chip highlight">案例分析</span><span class="capability-chip">法条检索</span><span class="capability-chip">论文辅导</span><span class="capability-chip">量刑参考</span><span class="capability-chip">实务指导</span><span class="capability-chip">比较法研究</span></div>' +
      '<div class="section-label">法学场景</div><div class="quick-prompts" id="quickPrompts"></div></div>';
    renderQuickPrompts();
    return;
  }

  var h = "";
  for (var i = 0; i < messages.length; i++) {
    var m = messages[i], role = m.role === "assistant" ? "ai" : "user";
    var avatar = role === "user" ? "📖" : "⚖️";
    h += '<div class="msg ' + role + ' show"><div class="msg-avatar">' + avatar + '</div>' +
      '<div class="msg-body"><div class="msg-content">' + renderMD(m.content) + '</div>' +
      (m._time ? '<div class="msg-time">' + fmtTime(m._time) + '</div>' : '') +
      '<div class="msg-actions"><button class="btn-copy" onclick="copyMsg(this)">复制</button></div></div></div>';
  }
  dom.messages.innerHTML = h;
  hlAll(); scrollBottom();
}

function renderMsg(role, content) {
  var w = dom.messages.querySelector(".welcome"); if (w) w.remove();
  var avatar = role === "user" ? "📖" : "⚖️";
  var div = document.createElement("div"); div.className = "msg " + role;
  div.innerHTML = '<div class="msg-avatar">' + avatar + '</div><div class="msg-body">' +
    '<div class="msg-content">' + renderMD(content) + '</div>' +
    '<div class="msg-time">' + getTimeStr() + '</div>' +
    '<div class="msg-actions"><button class="btn-copy" onclick="copyMsg(this)">复制</button></div></div>';
  dom.messages.appendChild(div);
  hlAll(); scrollBottom();
  requestAnimationFrame(function() { requestAnimationFrame(function() { div.classList.add("show"); }); });
}

function renderMD(text) {
  if (typeof marked === "undefined") return escHtml(text);
  try { return marked.parse(text, { breaks: true, gfm: true }); } catch(e) { return escHtml(text); }
}

function hlAll() {
  if (typeof hljs !== "undefined") document.querySelectorAll("pre code").forEach(function(b) { hljs.highlightElement(b); });
}

function scrollBottom() { requestAnimationFrame(function() { dom.chatArea.scrollTop = dom.chatArea.scrollHeight; }); }

function getTimeStr() {
  var d = new Date();
  return ("0" + d.getHours()).slice(-2) + ":" + ("0" + d.getMinutes()).slice(-2);
}

function fmtTime(ts) { var d = new Date(ts); return ("0" + d.getHours()).slice(-2) + ":" + ("0" + d.getMinutes()).slice(-2); }

function copyMsg(btn) {
  var t = btn.closest(".msg").querySelector(".msg-content").textContent;
  navigator.clipboard.writeText(t).then(function() {
    btn.textContent = "已复制";
    setTimeout(function() { btn.textContent = "复制"; }, 1500);
  }).catch(function() {});
}

function showError(msg) {
  var d = document.createElement("div"); d.className = "error-banner";
  d.textContent = "⚠️ " + msg; dom.messages.appendChild(d); scrollBottom();
}

// ============================================================
// API CALL
// ============================================================
function sendMessage(text) {
  if (streaming) return;
  text = text.trim(); if (!text) return;

  var sessionId = ++chatSessionId;
  streaming = true; dom.btnSend.disabled = true; dom.typing.style.display = "flex"; scrollBottom();

  messages.push({ role: "user", content: text, _time: Date.now() });
  renderMsg("user", text); persist();

  // Build API messages
  var sysP = buildSystemPrompt();
  var apiMsgs = [{ role: "system", content: sysP }];
  for (var i = 0; i < messages.length; i++) {
    apiMsgs.push({ role: messages[i].role === "assistant" ? "assistant" : "user", content: messages[i].content });
  }

  // Streaming element
  var msgDiv = document.createElement("div"); msgDiv.className = "msg ai";
  var contentDiv = document.createElement("div"); contentDiv.className = "msg-content"; contentDiv.textContent = " ";
  msgDiv.innerHTML = '<div class="msg-avatar">⚖️</div><div class="msg-body"></div>';
  msgDiv.querySelector(".msg-body").appendChild(contentDiv);
  dom.messages.appendChild(msgDiv); scrollBottom(); dom.typing.style.display = "none";
  requestAnimationFrame(function() { requestAnimationFrame(function() { msgDiv.classList.add("show"); }); });

  var fullContent = "", resolved = false;
  abortController = new AbortController(); var signal = abortController.signal;

  fetch("https://api.deepseek.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", Authorization: "Bearer " + SETTINGS.apiKey },
    body: JSON.stringify({ model: SETTINGS.model, messages: apiMsgs, stream: true, temperature: lawMode === "quick" ? 0.5 : 0.2, max_tokens: lawMode === "quick" ? 4096 : 8192 }),
    signal: signal
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t) { throw new Error("API " + resp.status + ": " + t.slice(0, 300)); });
    var reader = resp.body.getReader(), decoder = new TextDecoder(), buf = "";
    function pump() {
      if (resolved || chatSessionId !== sessionId) return;
      reader.read().then(function(result) {
        if (resolved || chatSessionId !== sessionId) return;
        if (result.done) {
          resolved = true; abortController = null;
          messages.push({ role: "assistant", content: fullContent || "（空响应）", _time: Date.now() }); persist();
          contentDiv.innerHTML = renderMD(fullContent || "（空响应）"); hlAll();
          var mt = document.createElement("div"); mt.className = "msg-time"; mt.textContent = getTimeStr();
          var act = document.createElement("div"); act.className = "msg-actions"; act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
          var body = msgDiv.querySelector(".msg-body"); body.appendChild(mt); body.appendChild(act);
          streaming = false; dom.btnSend.disabled = false; return;
        }
        buf += decoder.decode(result.value, { stream: true });
        var lines = buf.split("\n"); buf = lines.pop() || "";
        for (var i = 0; i < lines.length; i++) {
          var s = lines[i].trim(); if (!s.startsWith("data:")) continue;
          var data = s.slice(5).trim(); if (data === "[DONE]") continue;
          try {
            var p = JSON.parse(data), d = (p.choices || [{}])[0].delta; if (!d) continue;
            var t = d.content || ""; if (t) { fullContent += t; contentDiv.textContent = fullContent; scrollBottom(); }
          } catch(e) {}
        }
        pump();
      }).catch(function(e) {
        if (resolved || chatSessionId !== sessionId) return;
        resolved = true; abortController = null;
        if (fullContent) {
          messages.push({ role: "assistant", content: fullContent, _time: Date.now() }); persist();
          contentDiv.innerHTML = renderMD(fullContent); hlAll();
          var act = document.createElement("div"); act.className = "msg-actions"; act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
          msgDiv.querySelector(".msg-body").appendChild(act);
        } else if (!(e && e.name === "AbortError")) { msgDiv.remove(); }
        streaming = false; dom.btnSend.disabled = false; dom.typing.style.display = "none";
      });
    }
    pump();
  }).catch(function(e) {
    if (resolved || chatSessionId !== sessionId) return;
    resolved = true; abortController = null;
    if (fullContent) {
      messages.push({ role: "assistant", content: fullContent, _time: Date.now() }); persist();
      contentDiv.innerHTML = renderMD(fullContent); hlAll();
      var act = document.createElement("div"); act.className = "msg-actions"; act.innerHTML = '<button class="btn-copy" onclick="copyMsg(this)">复制</button>';
      msgDiv.querySelector(".msg-body").appendChild(act);
    } else if (!(e && e.name === "AbortError")) { showError(e.message); msgDiv.remove(); }
    streaming = false; dom.btnSend.disabled = false; dom.typing.style.display = "none";
  });
}

// ============================================================
// SETTINGS
// ============================================================
function toggleSettings() {
  var drop = document.getElementById("settingsDrop");
  if (!drop.classList.contains("show")) {
    document.getElementById("cfgApiKey").value = SETTINGS.apiKey;
    document.getElementById("cfgModel").value = SETTINGS.model;
    updateUI();
  }
  drop.classList.toggle("show");
  setTimeout(function() {
    document.addEventListener("click", function close(e) {
      if (!e.target.closest("#btnSettings") && !e.target.closest("#settingsDrop")) {
        drop.classList.remove("show");
        document.removeEventListener("click", close);
      }
    });
  }, 10);
}

function clearHistory() {
  if (!messages.length) return;
  if (!confirm("确定清空当前对话记录吗？")) return;
  messages.length = 0; persist(); renderAllMessages();
  document.getElementById("settingsDrop").classList.remove("show");
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  var t = document.createElement("div"); t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t); setTimeout(function() { t.remove(); }, 2200);
}

// ============================================================
// EVENTS
// ============================================================
dom.btnSend.addEventListener("click", function() {
  var text = dom.userInput.value.trim();
  if (!text || streaming) return;
  dom.userInput.value = ""; dom.userInput.style.height = "auto";
  sendMessage(text);
});

dom.userInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    var text = dom.userInput.value.trim();
    if (!text || streaming) return;
    dom.userInput.value = ""; dom.userInput.style.height = "auto";
    sendMessage(text);
  }
});

dom.userInput.addEventListener("input", function() {
  this.style.height = "auto"; this.style.height = Math.min(this.scrollHeight, 110) + "px";
});

dom.messages.addEventListener("click", function(e) {
  var btn = e.target.closest(".btn-copy"); if (btn) copyMsg(btn);
});

// Mode toggle (topbar button)
function toggleLawMode() {
  lawMode = lawMode === "deep" ? "quick" : "deep";
  saveOpts();
  var modeBtn = document.getElementById("btnMode");
  modeBtn.textContent = lawMode === "deep" ? "🔬" : "⚡";
  showToast(lawMode === "deep" ? "🔬 深度分析模式" : "⚡ 快速咨询模式");
}

// ============================================================
// UTILS
// ============================================================
function escAttr(s) { return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escHtml(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ============================================================
// INIT
// ============================================================
(function init() {
  document.getElementById("cfgModel").value = SETTINGS.model;
  updateUI();
  renderAllMessages();
  dom.userInput.focus();
})();
</script>
